<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Preventivatore AI · 3KT Impianti</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#f1f5f9; --panel:#ffffff; --ink:#1e293b; --muted:#64748b; --line:#e2e8f0;
    --navy:#0f172a; --cyan:#0891b2; --cyan-soft:#cffafe; --amber:#f59e0b;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{background:var(--bg);color:var(--ink);font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased}
  .mono{font-family:'JetBrains Mono',monospace}

  /* header */
  .top{background:var(--navy);color:#fff}
  .top-in{max-width:1080px;margin:0 auto;padding:14px 20px;display:flex;align-items:center;gap:12px}
  .logo{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;
        font-weight:800;color:var(--navy);background:linear-gradient(135deg,#22d3ee,#34d399 55%,#fbbf24)}
  .brand{line-height:1}
  .brand b{font-weight:800;letter-spacing:-.01em}
  .brand span{display:block;font-size:11px;color:#94a3b8;text-transform:uppercase;letter-spacing:.08em;margin-top:3px}
  .back{margin-left:auto;color:#cbd5e1;text-decoration:none;font-size:13px;font-weight:500;display:inline-flex;align-items:center;gap:6px}
  .back:hover{color:#fff}

  /* layout */
  .wrap{max-width:1080px;margin:0 auto;padding:22px 20px;display:grid;gap:18px;grid-template-columns:1.15fr 1fr}
  @media(max-width:860px){.wrap{grid-template-columns:1fr}}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:18px;box-shadow:0 1px 2px rgba(15,23,42,.04);display:flex;flex-direction:column;overflow:hidden;height:min(74vh,660px)}
  @media(max-width:860px){.card{height:70vh}}

  /* chat */
  .stream{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px}
  .row{display:flex}
  .row.me{justify-content:flex-end}
  .bub{max-width:82%;padding:10px 14px;border-radius:16px;font-size:14.5px;line-height:1.5;white-space:pre-wrap}
  .bub.ai{background:#f1f5f9;color:var(--ink);border-bottom-left-radius:5px}
  .bub.me{background:var(--cyan);color:#fff;border-bottom-right-radius:5px}
  .typing{display:flex;gap:4px;padding:12px 14px;background:#f1f5f9;border-radius:16px;border-bottom-left-radius:5px}
  .dot{width:7px;height:7px;border-radius:50%;background:#94a3b8;animation:b 1s infinite}
  .dot:nth-child(2){animation-delay:.15s}.dot:nth-child(3){animation-delay:.3s}
  @keyframes b{0%,80%,100%{transform:translateY(0);opacity:.5}40%{transform:translateY(-5px);opacity:1}}
  .composer{border-top:1px solid var(--line);padding:12px;display:flex;gap:8px}
  .composer input{flex:1;padding:11px 14px;border:none;border-radius:12px;background:#f1f5f9;font-size:14.5px;outline:none;font-family:inherit}
  .composer input:focus{box-shadow:0 0 0 2px #67e8f9}
  .composer button{padding:11px 20px;border:none;border-radius:12px;background:var(--navy);color:#fff;font-weight:600;font-size:14px;cursor:pointer;font-family:inherit}
  .composer button:hover{background:#1e293b}
  .composer button:disabled{opacity:.4;cursor:default}

  /* preventivo */
  .q-head{padding:16px 20px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between}
  .q-head .lab{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);font-weight:600}
  .q-head .cfg{font-size:18px;font-weight:800;margin-top:2px;letter-spacing:-.01em}
  .q-reset{background:none;border:none;color:#94a3b8;font-size:11px;text-decoration:underline;cursor:pointer}
  .q-body{flex:1;overflow-y:auto;padding:12px 20px}
  .q-empty{height:100%;display:flex;align-items:center;justify-content:center;text-align:center;color:#94a3b8;font-size:14px;padding:0 24px}
  .q-line{display:flex;align-items:baseline;gap:8px;padding:7px 0;border-bottom:1px dashed #f1f5f9;font-size:13px}
  .q-line .nm{flex:1}
  .q-line .qt{color:#94a3b8}
  .q-line .nt{color:#cbd5e1;font-size:11px}
  .q-line .pr{color:var(--ink);font-weight:500}
  .q-line .pr.zero{color:#cbd5e1;font-weight:400}
  .q-foot{border-top:1px solid var(--line);padding:16px 20px;background:#f8fafc}
  .q-foot .r{display:flex;justify-content:space-between;font-size:13px;color:var(--muted);padding:2px 0}
  .q-total{display:flex;justify-content:space-between;align-items:baseline;padding-top:6px}
  .q-total b{font-size:15px;font-weight:800;color:var(--navy)}
  .q-total .big{font-size:26px;font-weight:800;color:var(--navy)}
  .q-note{font-size:10.5px;color:#94a3b8;margin-top:6px;line-height:1.4}
  .warn{background:#fef3c7;color:#92400e;border:1px solid #fde68a;border-radius:12px;padding:10px 14px;margin:14px 20px;font-size:13px;line-height:1.45}
</style>
</head>
<body>
  <header class="top">
    <div class="top-in">
      <div class="logo">3</div>
      <div class="brand"><b>3KT Impianti</b><span>Preventivatore Pompa di Calore</span></div>
      <!-- Cambia l'href con la pagina da cui si apre (es. gerrynew.html) -->
      <a class="back" href="gerrynew.html">← Torna al sito</a>
    </div>
  </header>

  <div class="wrap">
    <!-- CHAT -->
    <section class="card">
      <div class="stream" id="stream"></div>
      <div class="composer">
        <input id="input" placeholder="Scriva qui la sua risposta…" autocomplete="off" />
        <button id="send">Invia</button>
      </div>
    </section>

    <!-- PREVENTIVO -->
    <section class="card">
      <div class="q-head">
        <div>
          <div class="lab">Preventivo indicativo</div>
          <div class="cfg" id="cfg">In compilazione…</div>
        </div>
        <button class="q-reset" id="reset">azzera</button>
      </div>
      <div class="q-body" id="qbody">
        <div class="q-empty">Il preventivo si costruisce qui, riga per riga, man mano che l'assistente raccoglie le informazioni.</div>
      </div>
      <div id="qfoot"></div>
    </section>
  </div>

<script>
/* ===== CONFIGURAZIONE ===================================================
   Metti qui l'URL del tuo Cloudflare Worker (endpoint /api/chat).
   Finché resta il placeholder, la pagina mostra un avviso. */
const WORKER_URL = "https://3kt-preventivi.dyko-moradi.workers.dev/api/chat";
const REPARTO = "POMPA_DI_CALORE";
/* ======================================================================= */

const GREETING = "Ciao! Sono l'assistente di 3KT Impianti 👋 La aiuto a farsi un'idea del costo per l'installazione di una pompa di calore. Per iniziare: nella sua casa c'è già una caldaia che vorrebbe mantenere, oppure partiamo da zero?";

const eur = n => new Intl.NumberFormat("it-IT",{style:"currency",currency:"EUR"}).format(n||0);
const $ = id => document.getElementById(id);

let messages = [{role:"assistant", content:GREETING}];
let spec = null, quote = null, done = false, loading = false;

function renderChat(){
  const s = $("stream"); s.innerHTML = "";
  messages.forEach(m=>{
    const row = document.createElement("div");
    row.className = "row" + (m.role==="user"?" me":"");
    const b = document.createElement("div");
    b.className = "bub " + (m.role==="user"?"me":"ai");
    b.textContent = m.content;
    row.appendChild(b); s.appendChild(row);
  });
  if(loading){
    const row=document.createElement("div"); row.className="row";
    row.innerHTML='<div class="typing"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>';
    s.appendChild(row);
  }
  s.scrollTop = s.scrollHeight;
}

function renderQuote(){
  $("cfg").textContent = (spec && spec.config) ? spec.config : "In compilazione…";
  const body = $("qbody"), foot = $("qfoot");
  if(!quote){
    body.innerHTML = '<div class="q-empty">Il preventivo si costruisce qui, riga per riga, man mano che l\'assistente raccoglie le informazioni.</div>';
    foot.innerHTML = ""; return;
  }
  body.innerHTML = "";
  quote.lines.forEach(l=>{
    const row = document.createElement("div"); row.className="q-line";
    row.innerHTML =
      '<span class="nm mono">'+escapeHtml(l.name)+
      (l.qty>1?' <span class="qt">×'+l.qty+'</span>':'')+
      (l.note?' <span class="nt">· '+escapeHtml(l.note)+'</span>':'')+'</span>'+
      '<span class="pr mono'+(l.total===0?' zero':'')+'">'+eur(l.total)+'</span>';
    body.appendChild(row);
  });
  foot.innerHTML =
    '<div class="q-foot">'+
      '<div class="r mono"><span>Imponibile</span><span>'+eur(quote.subtotal)+'</span></div>'+
      '<div class="r mono"><span>IVA 10%*</span><span>'+eur(quote.iva)+'</span></div>'+
      '<div class="q-total"><b>Totale</b><span class="big mono">'+eur(quote.total)+'</span></div>'+
      '<div class="q-note">'+(done?'Preventivo completo. ':'')+
        'Stima preliminare non vincolante, da confermare con sopralluogo. *IVA agevolata 10% da verificare per il singolo intervento.</div>'+
    '</div>';
}

function escapeHtml(s){return String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}

function showWarn(msg){
  const w=document.createElement("div"); w.className="warn"; w.textContent=msg;
  $("stream").parentElement.insertBefore(w, $("stream").nextSibling);
}

async function send(){
  const inp = $("input"); const text = inp.value.trim();
  if(!text || loading) return;
  if(WORKER_URL.includes("TUO-SUBDOMINIO")){
    messages.push({role:"assistant", content:"⚠️ La pagina non è ancora collegata al backend. Imposta WORKER_URL nel codice con l'indirizzo del Worker."});
    renderChat(); return;
  }
  messages.push({role:"user", content:text}); inp.value="";
  loading=true; renderChat();
  try{
    const res = await fetch(WORKER_URL,{
      method:"POST",
      headers:{"content-type":"application/json"},
      body:JSON.stringify({reparto:REPARTO, messages:messages.map(m=>({role:m.role,content:m.content}))})
    });
    const data = await res.json();
    loading=false;
    messages.push({role:"assistant", content:data.reply || "…"});
    if(data.spec) spec = Object.assign({}, spec||{}, data.spec);
    if(data.quote) quote = data.quote;
    if(data.done) done = true;
    renderChat(); renderQuote();
  }catch(e){
    loading=false;
    messages.push({role:"assistant", content:"Errore di connessione. Riprovi tra un momento."});
    renderChat();
  }
}

function reset(){
  spec=null; quote=null; done=false;
  messages=[{role:"assistant", content:"Ricominciamo. C'è già una caldaia da mantenere, oppure partiamo da zero?"}];
  renderChat(); renderQuote();
}

$("send").addEventListener("click", send);
$("input").addEventListener("keydown", e=>{ if(e.key==="Enter") send(); });
$("reset").addEventListener("click", reset);

renderChat(); renderQuote();
if(WORKER_URL.includes("TUO-SUBDOMINIO")){
  showWarn("Backend non ancora configurato: imposta WORKER_URL nel codice con l'indirizzo del tuo Cloudflare Worker per attivare l'assistente.");
}
</script>
</body>
</html>
