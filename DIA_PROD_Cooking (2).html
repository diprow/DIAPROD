document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

{ 0%,100%{ opacity:.55; transform:translateX(-50%) scale(1); } 50%{ opacity:.9; transform:translateX(-50%) scale(1.1); } }\n    @keyframes steamRise {\n      0%   { opacity:0; transform:translateY(14px) scaleX(.9); }\n      20%  { opacity:.55; }\n      100% { opacity:0; transform:translateY(-78px) scaleX(1.7); }\n    }\n    @keyframes sceneBob { 0%,100%{ transform:translateY(0); } 50%{ transform:translateY(-6px); } }\n    @keyframes dotPulse { 0%,100%{ opacity:.3; } 50%{ opacity:1; } }\n  <\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"min-height:100dvh; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:clamp(8px,2vw,16px); background:radial-gradient(120% 80% at 50% 18%, #14141a 0%, #0b0b0c 60%); color:#e9e9ee; font-family:'Helvetica Neue',Helvetica,Arial,sans-serif; font-weight:300; position:relative; overflow:hidden; padding:max(28px,env(safe-area-inset-top)) 24px max(36px,env(safe-area-inset-bottom));\">\n\n  <svg width=\"0\" height=\"0\" style=\"position:absolute\" aria-hidden=\"true\"><defs>\n    <linearGradient id=\"chromeC\" x1=\"0\" y1=\"0\" x2=\"0\" y2=\"1\">\n      <stop offset=\"0\" stop-color=\"#ffffff\"><\u002Fstop>\n      <stop offset=\"0.16\" stop-color=\"#e9e9ee\"><\u002Fstop>\n      <stop offset=\"0.5\" stop-color=\"#b7b7c0\"><\u002Fstop>\n      <stop offset=\"0.72\" stop-color=\"#dadadf\"><\u002Fstop>\n      <stop offset=\"1\" stop-color=\"#f4f4f7\"><\u002Fstop>\n    <\u002FlinearGradient>\n    <linearGradient id=\"panSteel\" x1=\"0\" y1=\"0\" x2=\"0\" y2=\"1\">\n      <stop offset=\"0\" stop-color=\"#3a3a42\"><\u002Fstop>\n      <stop offset=\"1\" stop-color=\"#0e0e12\"><\u002Fstop>\n    <\u002FlinearGradient>\n    <radialGradient id=\"bowlInner\" cx=\"0.5\" cy=\"0.42\" r=\"0.7\">\n      <stop offset=\"0\" stop-color=\"#26262d\"><\u002Fstop>\n      <stop offset=\"1\" stop-color=\"#101015\"><\u002Fstop>\n    <\u002FradialGradient>\n  <\u002Fdefs><\u002Fsvg>\n\n  <!-- header wordmark -->\n  <div style=\"position:absolute; top:max(24px,env(safe-area-inset-top)); left:50%; transform:translateX(-50%); display:flex; align-items:center; gap:11px; z-index:5;\">\n    <svg viewBox=\"92 40 388 280\" width=\"30\" style=\"display:block; overflow:visible;\">\n      <g fill=\"url(#chromeC)\" stroke=\"rgba(255,255,255,0.5)\" stroke-width=\"1.6\" stroke-linejoin=\"round\">\n        <path fill-rule=\"evenodd\" d=\"M120,64 H300 A116,116 0 0 1 300,296 H120 Z M176,120 H300 A60,60 0 0 1 300,240 H176 Z\"><\u002Fpath>\n        <path d=\"M380,140 L452,118 L452,242 L380,220 Z\"><\u002Fpath>\n      <\u002Fg>\n    <\u002Fsvg>\n    <span style=\"font-size:13px; font-weight:400; letter-spacing:0.34em; padding-left:0.34em;\">{{ studioName }}<\u002Fspan>\n  <\u002Fdiv>\n\n  <!-- ============ COOKING SCENE ============ -->\n  <div style=\"position:relative; width:clamp(300px,84vw,470px); height:clamp(270px,72vw,380px); margin-top:clamp(36px,8vw,40px); animation:{{ bobAnim }};\">\n\n    <!-- stove heat glow -->\n    <div style=\"position:absolute; left:50%; bottom:6%; width:62%; height:24%; border-radius:50%; background:radial-gradient(circle, rgba(244,168,120,0.55), rgba(244,120,80,0.12) 55%, transparent 72%); filter:blur(10px); animation:{{ heatAnim }}; z-index:0;\"><\u002Fdiv>\n\n    <!-- steam -->\n    <div style=\"position:absolute; left:42%; top:8%; width:10px; height:60px; border-radius:50%; background:linear-gradient(to top, rgba(255,255,255,0.35), transparent); filter:blur(5px); animation:{{ steam1 }}; z-index:1;\"><\u002Fdiv>\n    <div style=\"position:absolute; left:52%; top:4%; width:11px; height:70px; border-radius:50%; background:linear-gradient(to top, rgba(255,255,255,0.3), transparent); filter:blur(6px); animation:{{ steam2 }}; z-index:1;\"><\u002Fdiv>\n    <div style=\"position:absolute; left:60%; top:10%; width:9px; height:54px; border-radius:50%; background:linear-gradient(to top, rgba(255,255,255,0.28), transparent); filter:blur(5px); animation:{{ steam3 }}; z-index:1;\"><\u002Fdiv>\n\n    <!-- pan -->\n    <div style=\"position:absolute; left:50%; bottom:5%; width:96%; transform:translateX(-50%); z-index:2;\">\n      <div style=\"transform-origin:70% 58%; animation:{{ panAnim }};\">\n        <svg viewBox=\"0 0 470 250\" width=\"100%\" style=\"display:block; overflow:visible; filter:drop-shadow(0 16px 24px rgba(0,0,0,0.5));\">\n          <!-- handle -->\n          <g transform=\"rotate(-13 360 150)\">\n            <rect x=\"352\" y=\"139\" width=\"118\" height=\"22\" rx=\"11\" fill=\"url(#chromeC)\" stroke=\"rgba(0,0,0,0.25)\" stroke-width=\"1\"><\u002Frect>\n            <rect x=\"372\" y=\"135\" width=\"14\" height=\"30\" rx=\"5\" fill=\"#1a1a1f\"><\u002Frect>\n          <\u002Fg>\n          <!-- bowl depth (front wall) -->\n          <path d=\"M62,150 C62,188 358,188 358,150 L358,150 C358,178 62,178 62,150 Z\" fill=\"url(#panSteel)\"><\u002Fpath>\n          <!-- bowl interior -->\n          <ellipse cx=\"210\" cy=\"150\" rx=\"150\" ry=\"45\" fill=\"url(#bowlInner)\"><\u002Fellipse>\n          <!-- rim -->\n          <ellipse cx=\"210\" cy=\"150\" rx=\"150\" ry=\"45\" fill=\"none\" stroke=\"url(#chromeC)\" stroke-width=\"11\"><\u002Fellipse>\n          <ellipse cx=\"210\" cy=\"150\" rx=\"150\" ry=\"45\" fill=\"none\" stroke=\"rgba(0,0,0,0.18)\" stroke-width=\"1.5\"><\u002Fellipse>\n        <\u002Fsvg>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- camera being tossed -->\n    <div style=\"position:absolute; left:50%; bottom:33%; width:32%; transform:translateX(-50%); z-index:3;\">\n      <div style=\"animation:{{ camAnim }};\">\n        <svg viewBox=\"92 40 388 280\" width=\"100%\" style=\"display:block; overflow:visible; animation:{{ camGlow }};\">\n          <g fill=\"url(#chromeC)\" stroke=\"rgba(255,255,255,0.5)\" stroke-width=\"1.4\" stroke-linejoin=\"round\">\n            <path fill-rule=\"evenodd\" d=\"M120,64 H300 A116,116 0 0 1 300,296 H120 Z M176,120 H300 A60,60 0 0 1 300,240 H176 Z\"><\u002Fpath>\n            <path d=\"M380,140 L452,118 L452,242 L380,220 Z\"><\u002Fpath>\n          <\u002Fg>\n        <\u002Fsvg>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ============ COPY ============ -->\n  <div style=\"display:flex; flex-direction:column; align-items:center; text-align:center; gap:clamp(14px,3vw,20px); position:relative; z-index:5; max-width:560px;\">\n    <span style=\"font-size:11px; letter-spacing:0.34em; color:{{ accent }}; font-weight:400; display:inline-flex; align-items:center; gap:9px;\"><span style=\"width:6px; height:6px; border-radius:50%; background:{{ accent }}; box-shadow:0 0 10px {{ accent }}; animation:dotPulse 1.6s ease-in-out infinite;\"><\u002Fspan>{{ kicker }}<\u002Fspan>\n    <h1 style=\"margin:0; font-weight:200; font-size:clamp(30px,7vw,56px); line-height:1.06; letter-spacing:-0.01em; text-wrap:balance;\">We’re cooking up<br>something <span style=\"font-weight:400;\">cool.<\u002Fspan><\u002Fh1>\n    <p style=\"margin:0; color:rgba(233,236,248,0.6); font-size:clamp(14px,2.4vw,17px); line-height:1.7; max-width:38ch;\">Our new home is in the oven. DIA PROD is plating up a fresh site — films, photography, the works. Sit tight, it’ll be worth the wait.<\u002Fp>\n\n    <!-- notify -->\n    <sc-if value=\"{{ notNotified }}\" hint-placeholder-val=\"{{ true }}\">\n      <form onsubmit=\"{{ onNotify }}\" style=\"display:flex; gap:9px; flex-wrap:wrap; justify-content:center; margin-top:8px; width:100%; max-width:420px;\">\n        <input type=\"email\" value=\"{{ email }}\" oninput=\"{{ setEmail }}\" placeholder=\"Email me when it’s ready\" style=\"flex:1; min-width:200px; padding:14px 18px; border-radius:999px; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.12); color:#e9e9ee; font-size:15px; outline:none; transition:border-color .25s;\" style-focus=\"border-color:{{ accentBorder }}\">\n        <button type=\"submit\" style=\"padding:14px 26px; border-radius:999px; border:none; cursor:pointer; background:linear-gradient(180deg,#ffffff,#cdced6); color:#101013; font-size:14px; font-weight:500; letter-spacing:0.02em; opacity:{{ notifyOpacity }}; pointer-events:{{ notifyPE }}; box-shadow:0 6px 22px {{ accentGlow }}; transition:transform .2s;\" style-hover=\"transform:translateY(-1px)\">{{ notifyLabel }}<\u002Fbutton>\n      <\u002Fform>\n      <sc-if value=\"{{ errorMsg }}\" hint-placeholder-val=\"{{ '' }}\">\n        <div style=\"margin-top:2px; font-size:13px; color:#ff9d9d;\">{{ errorMsg }}<\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fsc-if>\n    <sc-if value=\"{{ notified }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"margin-top:8px; padding:14px 24px; border-radius:999px; background:rgba(157,184,255,0.1); border:1px solid {{ accentBorder }}; font-size:14.5px; color:#e9e9ee;\">You’re on the list — we’ll ping you at launch ✨<\u002Fdiv>\n    <\u002Fsc-if>\n\n    <div style=\"margin-top:clamp(10px,3vw,18px); display:flex; flex-wrap:wrap; gap:7px 22px; justify-content:center; color:rgba(233,236,248,0.4); font-size:12px; letter-spacing:0.12em;\">\n      <a href=\"mailto:dyko.moradi@gmail.com\" style=\"color:inherit; text-decoration:none;\">dyko.moradi@gmail.com<\u002Fa><span>·<\u002Fspan><a href=\"https://instagram.com/diaprod.it\" target=\"_blank\" rel=\"noopener\" style=\"color:inherit; text-decoration:none;\">INSTAGRAM<\u002Fa><span>·<\u002Fspan><span>© 2026 DIA PROD<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n<\u002Fdiv>\n\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{\n  &quot;$preview&quot;: { &quot;width&quot;: 440, &quot;height&quot;: 880 },\n  &quot;studioName&quot;: { &quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;DIA PROD&quot;, &quot;tsType&quot;: &quot;string&quot; },\n  &quot;kicker&quot;: { &quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;NEW SITE IN THE MAKING&quot;, &quot;tsType&quot;: &quot;string&quot; },\n  &quot;accent&quot;: { &quot;editor&quot;: &quot;color&quot;, &quot;default&quot;: &quot;#9db8ff&quot;, &quot;options&quot;: [&quot;#9db8ff&quot;, &quot;#f0a878&quot;, &quot;#7fe0c4&quot;, &quot;#c9a9ff&quot;], &quot;tsType&quot;: &quot;string&quot; },\n  &quot;motion&quot;: { &quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: true, &quot;tsType&quot;: &quot;boolean&quot; }\n}\">\nclass Component extends DCLogic {\n  WORKER_URL = 'https://dia-prod-notify.dyko-moradi.workers.dev';\n  state = { email:'', notified:false, submitting:false, error:'' };\n\n  motion(){ return this.props.motion ?? true; }\n\n  renderVals(){\n    const accent = this.props.accent || '#9db8ff';\n    const hex=(accent||'#9db8ff').replace('#','');\n    const n=parseInt(hex.length===3?hex.split('').map(c=>c+c).join(''):hex,16);\n    const rgba=(a)=>`rgba(${(n>>16)&255},${(n>>8)&255},${n&255},${a})`;\n    const mo=this.motion();\n    const emailOk=/.+@.+\\..+/.test(this.state.email);\n    const canSubmit = emailOk && !this.state.submitting;\n\n    return {\n      studioName: this.props.studioName || 'DIA PROD',\n      kicker: this.props.kicker || 'NEW SITE IN THE MAKING',\n      accent, accentBorder:rgba(0.55), accentGlow:rgba(0.36),\n\n      panAnim: mo ? 'panToss 2.8s cubic-bezier(.4,0,.3,1) infinite' : 'none',\n      camAnim: mo ? 'camFlip 2.8s linear infinite' : 'none',\n      camGlow: mo ? 'diaGlowC 3.4s ease-in-out infinite' : 'none',\n      heatAnim: mo ? 'heatGlow 2.8s ease-in-out infinite' : 'none',\n      bobAnim: mo ? 'sceneBob 4.5s ease-in-out infinite' : 'none',\n      steam1: mo ? 'steamRise 3.2s ease-in 0s infinite' : 'none',\n      steam2: mo ? 'steamRise 3.6s ease-in 0.7s infinite' : 'none',\n      steam3: mo ? 'steamRise 3.0s ease-in 1.4s infinite' : 'none',\n\n      email:this.state.email, setEmail:e=>this.setState({email:e.target.value, error:''}),\n      notified:this.state.notified, notNotified:!this.state.notified,\n      notifyOpacity:canSubmit?1:0.45, notifyPE:canSubmit?'auto':'none',\n      notifyLabel: this.state.submitting ? 'Sending\u2026' : 'Notify me',\n      errorMsg: this.state.error,\n\n      onNotify: async (e) => {\n        e.preventDefault();\n        if (!emailOk || this.state.submitting) return;\n        this.setState({ submitting: true, error: '' });\n        try {\n          const res = await fetch(this.WORKER_URL, {\n            method: 'POST',\n            headers: { 'Content-Type': 'application/json' },\n            body: JSON.stringify({ email: this.state.email }),\n          });\n          const data = await res.json();\n          if (!res.ok || !data.success) {\n            throw new Error(data.error || 'Something went wrong. Please try again.');\n          }\n          this.setState({ notified: true, submitting: false });\n        } catch (err) {\n          this.setState({ submitting: false, error: err.message || 'Something went wrong. Please try again.' });\n        }\n      },\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
