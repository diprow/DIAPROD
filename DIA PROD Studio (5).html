document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ursor:pointer; font-size:15px; line-height:1; padding:0;\">×<\u002Fbutton><\u002Fspan>\n                        <\u002Fsc-for>\n                      <\u002Fdiv>\n                    <\u002Fsc-if>\n                  <\u002Fdiv>\n                <\u002Fsc-if>\n\n                <sc-if value=\"{{ isStep6 }}\" hint-placeholder-val=\"{{ false }}\">\n                  <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:14px;\">\n                    <input type=\"text\" value=\"{{ draftName }}\" oninput=\"{{ setName }}\" placeholder=\"Full name\" style=\"grid-column:1/-1; padding:16px 18px; border-radius:12px; background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.1); color:#e9e9ee; font-size:16px; outline:none;\" style-focus=\"border-color:{{ accentBorder }}\">\n                    <input type=\"email\" value=\"{{ draftEmail }}\" oninput=\"{{ setEmail }}\" placeholder=\"Email\" style=\"padding:16px 18px; border-radius:12px; background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.1); color:#e9e9ee; font-size:16px; outline:none;\" style-focus=\"border-color:{{ accentBorder }}\">\n                    <input type=\"tel\" value=\"{{ draftPhone }}\" oninput=\"{{ setPhone }}\" placeholder=\"Phone (optional)\" style=\"padding:16px 18px; border-radius:12px; background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.1); color:#e9e9ee; font-size:16px; outline:none;\" style-focus=\"border-color:{{ accentBorder }}\">\n                    <input type=\"text\" value=\"{{ draftCompany }}\" oninput=\"{{ setCompany }}\" placeholder=\"Company / brand (optional)\" style=\"grid-column:1/-1; padding:16px 18px; border-radius:12px; background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.1); color:#e9e9ee; font-size:16px; outline:none;\" style-focus=\"border-color:{{ accentBorder }}\">\n                  <\u002Fdiv>\n                <\u002Fsc-if>\n\n                <sc-if value=\"{{ isStep7 }}\" hint-placeholder-val=\"{{ false } ze:14px; font-weight:500; letter-spacing:0.04em; opacity:{{ continueOpacity }}; pointer-events:{{ continuePE }}; box-shadow:0 6px 24px {{ accentGlow }}; transition:opacity .25s, transform .25s;\" style-hover=\"transform:translateY(-1px)\">Continue<\u002Fbutton>\n              <\u002Fsc-if>\n              <sc-if value=\"{{ showSubmit }}\" hint-placeholder-val=\"{{ false }}\">\n                <button onclick=\"{{ submit }}\" style=\"padding:15px 36px; border-radius:999px; border:none; cursor:pointer; background:linear-gradient(180deg,#ffffff,#cdced6); color:#101013; font-size:14px; font-weight:600; letter-spacing:0.04em; box-shadow:0 0 0 1px rgba(255,255,255,0.4), 0 8px 30px {{ accentGlow }}; transition:transform .25s;\" style-hover=\"transform:translateY(-1px)\">Submit request<\u002Fbutton>\n              <\u002Fsc-if>\n            <\u002Fdiv>\n          <\u002Fsection>\n        <\u002Fsc-if>\n\n        <sc-if value=\"{{ submitted }}\" hint-placeholder-val=\"{{ false }}\">\n          <section style=\"max-width:560px; margin:0 auto; padding:clamp(60px,12vw,120px) clamp(20px,5vw,40px); min-height:calc(100dvh - 74px); display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; gap:26px;\">\n            <svg viewBox=\"92 40 388 280\" width=\"120\" style=\"display:block; overflow:visible; animation:diaGlow 3.6s ease-in-out infinite;\">\n              <g fill=\"url(#chrome)\" stroke=\"rgba(255,255,255,0.5)\" stroke-width=\"1.2\" stroke-linejoin=\"round\">\n                <path fill-rule=\"evenodd\" d=\"M120,64 H300 A116,116 0 0 1 300,296 H120 Z M176,120 H300 A60,60 0 0 1 300,240 H176 Z\"><\u002Fpath>\n                <path d=\"M380,140 L452,118 L452,242 L380,220 Z\"><\u002Fpath>\n              <\u002Fg>\n            <\u002Fsvg>\n            <h2 style=\"margin:0; font-weight:200; font-size:clamp(28px,5vw,42px);\">Request received<\u002Fh2>\n            <p style=\"margin:0; color:rgba(233,236,248,0.6); font-size:16px; line-height:1.7; max-width:38ch;\">Thanks{{ submittedName }}. Our producers will review your brief and reply within one business day.<\u002Fp>\n            <div style=\"display:flex; flex-direction:column; gap:6px; padding:18px 28px; border-radius:14px; background:rgba(255,255,255,0.04); border:1px solid {{ accentBorder }};\">\n              <span style=\"font-size:11px; letter-spacing:0.24em; color:rgba(233,236,248,0.45);\">YOUR REFERENCE<\u002Fspan>\n              <span style=\"font-size:22px; font-weight:400; letter-spacing:0.14em; color:{{ accent }};\">{{ lastId }}<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"display:flex; flex-wrap:wrap; gap:12px; justify-content:center; margin-top:6px;\">\n              <button onclick=\"{{ goTrack }}\" style=\"padding:14px 28px; border-radius:999px; border:none; cursor:pointer; background:linear-gradient(180deg,#ffffff,#cdced6); color:#101013; font-size:14px; font-weight:500;\">Track this project<\u002Fbutton>\n              <button onclick=\"{{ startAnother }}\" style=\"padding:14px 28px; border-radius:999px; cursor:pointer; background:transparent; border:1px solid rgba(255,255,255,0.18); color:#e9e9ee; font-size:14px;\">Start another<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fsection>\n        <\u002Fsc-if>\n      <\u002Fsc-if>\n\n      <!-- ---------- WORK ---------- -->\n      <sc-if value=\"{{ isWork }}\" hint-placeholder-val=\"{{ false }}\">\n        <section style=\"max-width:680px; margin:0 auto; padding:clamp(20px,5vw,40px) clamp(20px,5vw,40px); min-height:calc(100dvh - 74px); display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; gap:clamp(24px,5vw,34px);\">\n          <svg viewBox=\"92 40 388 280\" width=\"clamp(96px,24vw,132px)\" style=\"display:block; overflow:visible; animation:{{ markAnim }};\">\n            <g fill=\"url(#chrome)\" stroke=\"rgba(255,255,255,0.5)\" stroke-width=\"1.2\" stroke-linejoin=\"round\">\n              <path fill-rule=\"evenodd\" d=\"M120,64 H300 A116,116 0 0 1 300,296 H120 Z M176,120 H300 A60,60 0 0 1 300,240 H176 Z\"><\u002Fpath>\n              <path d=\"M380,140 L452,118 L452,242 L380,220 Z\"><\u002Fpath>\n            <\u002Fg>\n          <\u002Fsvg>\n          <span style=\"font-size:11px; letter-spacing:0.34em; color:{{ accent }};\">OUR WORK<\u002Fspan>\n          <h1 style=\"margin:0; font-weight:200; font-size:clamp(30px,6vw,54px); line-height:1.08;\">Our work is coming soon&nbsp;:)<\u002Fh1>\n          <p style=\"margin:0; color:rgba(233,236,248,0.55); font-size:clamp(15px,2.4vw,18px); line-height:1.7; max-width:40ch;\">We’re putting the finishing touches on our showreel — films and photography land here very soon. In the meantime, let’s talk about yours.<\u002Fp>\n          <div style=\"display:flex; flex-wrap:wrap; gap:13px; justify-content:center; margin-top:4px;\">\n            <button onclick=\"{{ goRequest }}\" style=\"padding:15px 30px; border-radius:999px; border:none; cursor:pointer; background:linear-gradient(180deg,#ffffff,#cdced6); color:#101013; font-size:14px; font-weight:500; letter-spacing:0.04em; box-shadow:0 8px 30px {{ accentGlow }}; transition:transform .25s;\" style-hover=\"transform:translateY(-2px)\">Start a project<\u002Fbutton>\n            <button onclick=\"{{ goCall }}\" style=\"padding:15px 30px; border-radius:999px; cursor:pointer; background:transparent; border:1px solid rgba(255,255,255,0.18); color:#e9e9ee; font-size:14px; font-weight:300; transition:border-color .25s,background .25s;\" style-hover=\"border-color:rgba(255,255,255,0.5); background:rgba(255,255,255,0.04)\">Book a call<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fsection>\n      <\u002Fsc-if>\n\n      <!-- ---------- PACKAGES ---------- -->\n      <sc-if value=\"{{ isPackages }}\" hint-placeholder-val=\"{{ false }}\">\n        <section style=\"max-width:1100px; margin:0 auto; padding:clamp(40px,7vw,80px) clamp(20px,5vw,48px) 90px;\">\n          <div style=\"display:flex; flex-direction:column; gap:10px; margin-bottom:44px; text-align:center; align-items:center;\">\n            <span style=\"font-size:11px; letter-spacing:0.34em; color:{{ accent }};\">PACKAGES<\u002Fspan>\n            <h1 style=\"margin:0; font-weight:200; font-size:clamp(30px,5vw,52px);\">Starting points.<\u002Fh1>\n            <p style=\"margin:0; color:rgba(233,236,248,0.5); max-width:46ch; font-size:15px;\">Every project is scoped to you — these are where most begin.<\u002Fp>\n          <\u002Fdiv>\n          <div style=\"display:grid; grid-template-columns:repeat(auto-fit,minmax(260px,1fr)); gap:18px; align-items:stretch;\">\n            <sc-for list=\"{{ packages }}\" as=\"p\" hint-placeholder-count=\"3\">\n              <div style=\"display:flex; flex-direction:column; gap:20px; padding:30px 26px; border-radius:20px; background:{{ p.bg }}; border:1px solid {{ p.border }}; box-shadow:{{ p.shadow }};\">\n                <div style=\"display:flex; flex-direction:column; gap:6px;\">\n                  <sc-if value=\"{{ p.featured }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"align-self:flex-start; font-size:10px; letter-spacing:0.22em; color:#101013; background:{{ accent }}; padding:4px 10px; border-radius:999px;\">MOST CHOSEN<\u002Fspan><\u002Fsc-if>\n                  <span style=\"font-size:20px; font-weight:400;\">{{ p.name }}<\u002Fspan>\n                  <span style=\"font-size:14px; color:rgba(233,236,248,0.55);\">{{ p.price }}<\u002Fspan>\n                <\u002Fdiv>\n                <div style=\"display:flex; flex-direction:column; gap:11px; flex:1;\">\n                  <sc-for list=\"{{ p.points }}\" as=\"pt\" hint-placeholder-count=\"3\">\n                    <span style=\"display:flex; gap:10px; font-size:13.5px; color:rgba(233,236,248,0.72); line-height:1.4;\"><span style=\"color:{{ accent }};\">—<\u002Fspan>{{ pt }}<\u002Fspan>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n                <button onclick=\"{{ p.onChoose }}\" style=\"padding:13px; border-radius:999px; cursor:pointer; border:1px solid {{ p.btnBorder }}; background:{{ p.btnBg }}; color:{{ p.btnColor }}; font-size:13.5px; font-weight:500; letter-spacing:0.03em; transition:transform .2s;\" style-hover=\"transform:translateY(-1px)\">Start with this<\u002Fbutton>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <div style=\"margin-top:24px; text-align:center;\">\n            <button onclick=\"{{ goRequest }}\" style=\"background:none; border:none; cursor:pointer; color:rgba(233,236,248,0.6); font-size:14px; text-decoration:underline; text-underline-offset:4px;\">Something else? Tell us what you need →<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fsection>\n      <\u002Fsc-if>\n\n      <!-- ---------- TRACK ---------- -->\n      <sc-if value=\"{{ isTrack }}\" hint-placeholder-val=\"{{ false }}\">\n        <section style=\"max-width:720px; margin:0 auto; padding:clamp(40px,7vw,80px) clamp(20px,5vw,40px) 90px;\">\n          <div style=\"display:flex; flex-direction:column; gap:10px; margin-bottom:30px;\">\n            <span style=\"font-size:11px; letter-spacing:0.34em; color:{{ accent }};\">TRACK<\u002Fspan>\n            <h1 style=\"margin:0; font-weight:200; font-size:clamp(30px,5vw,48px);\">Your projects.<\u002Fh1>\n          <\u002Fdiv>\n          <input type=\"text\" value=\"{{ lookup }}\" oninput=\"{{ setLookup }}\" placeholder=\"Search by reference, e.g. DIA-7K2P\" style=\"width:100%; padding:16px 18px; border-radius:12px; background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.1); color:#e9e9ee; font-size:15px; outline:none; margin-bottom:24px;\" style-focus=\"border-color:{{ accentBorder }}\">\n\n          <sc-if value=\"{{ hasRequests }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"display:flex; flex-direction:column; gap:14px;\">\n              <sc-for list=\"{{ trackList }}\" as=\"t\" hint-placeholder-count=\"2\">\n                <div style=\"padding:22px 24px; border-radius:16px; background:rgba(255,255,255,0.035); border:1px solid rgba(255,255,255,0.08);\">\n                  <div style=\"display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:18px;\">\n                    <div style=\"display:flex; flex-direction:column; gap:4px;\">\n                      <span style=\"font-size:16px; font-weight:400;\">{{ t.type }}<\u002Fspan>\n                      <span style=\"font-size:12px; letter-spacing:0.16em; color:rgba(233,236,248,0.42);\">{{ t.id }} · {{ t.date }}<\u002Fspan>\n                    <\u002Fdiv>\n                    <span style=\"font-size:11px; letter-spacing:0.14em; padding:6px 13px; border-radius:999px; color:{{ accent }}; background:rgba(157,184,255,0.12); border:1px solid {{ accentBorder }};\">{{ t.status }}<\u002Fspan>\n                  <\u002Fdiv>\n                  <div style=\"display:flex; align-items:center; gap:6px;\">\n                    <sc-for list=\"{{ t.stages }}\" as=\"s\" hint-placeholder-count=\"4\">\n                      <div style=\"flex:1; display:flex; flex-direction:column; gap:7px;\">\n                        <div style=\"height:3px; border-radius:3px; background:{{ s.barColor }};\"><\u002Fdiv>\n                        <span style=\"font-size:9.5px; letter-spacing:0.08em; color:{{ s.labelColor }};\">{{ s.name }}<\u002Fspan>\n                      <\u002Fdiv>\n                    <\u002Fsc-for>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n          <sc-if value=\"{{ noRequests }}\" hint-placeholder-val=\"{{ true }}\">\n            <div style=\"text-align:center; padding:60px 20px; color:rgba(233,236,248,0.45); display:flex; flex-direction:column; gap:18px; align-items:center;\">\n              <p style=\"margin:0; font-size:15px;\">{{ emptyTrackMsg }}<\u002Fp>\n              <button onclick=\"{{ goRequest }}\" style=\"padding:13px 26px; border-radius:999px; border:none; cursor:pointer; background:linear-gradient(180deg,#ffffff,#cdced6); color:#101013; font-size:13.5px; font-weight:500;\">Start a project<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fsection>\n      <\u002Fsc-if>\n\n      <!-- ---------- BOOK A CALL ---------- -->\n      <sc-if value=\"{{ isCall }}\" hint-placeholder-val=\"{{ false }}\">\n        <section style=\"max-width:620px; margin:0 auto; padding:clamp(40px,7vw,80px) clamp(20px,5vw,40px) 90px;\">\n          <div style=\"display:flex; flex-direction:column; gap:10px; margin-bottom:32px;\">\n            <span style=\"font-size:11px; letter-spacing:0.34em; color:{{ accent }};\">CONSULTATION<\u002Fspan>\n            <h1 style=\"margin:0; font-weight:200; font-size:clamp(30px,5vw,48px);\">Book a call.<\u002Fh1>\n            <p style=\"margin:0; color:rgba(233,236,248,0.5); font-size:15px;\">A 20-minute intro with a producer. Pick a slot that works.<\u002Fp>\n          <\u002Fdiv>\n          <sc-if value=\"{{ callBooked }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"padding:30px; border-radius:16px; background:rgba(157,184,255,0.08); border:1px solid {{ accentBorder }}; text-align:center; display:flex; flex-direction:column; gap:10px;\">\n              <span style=\"font-size:18px;\">You’re booked.<\u002Fspan>\n              <span style=\"font-size:14px; color:rgba(233,236,248,0.6);\">{{ callConfirm }} — we’ll send a calendar invite.<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n          <sc-if value=\"{{ callNotBooked }}\" hint-placeholder-val=\"{{ true }}\">\n            <div style=\"display:flex; flex-direction:column; gap:22px;\">\n              <div style=\"display:flex; flex-direction:column; gap:10px;\">\n                <span style=\"font-size:12px; letter-spacing:0.16em; color:rgba(233,236,248,0.45);\">PICK A SLOT<\u002Fspan>\n                <div style=\"display:flex; flex-wrap:wrap; gap:10px;\">\n                  <sc-for list=\"{{ slotOptions }}\" as=\"s\" hint-placeholder-count=\"6\">\n                    <button onclick=\"{{ s.onSelect }}\" style=\"padding:12px 18px; border-radius:12px; cursor:pointer; font-size:13.5px; border:1px solid {{ s.border }}; background:{{ s.bg }}; color:{{ s.text }}; transition:all .2s;\">{{ s.label }}<\u002Fbutton>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n              <\u002Fdiv>\n              <input type=\"text\" value=\"{{ callName }}\" oninput=\"{{ setCallName }}\" placeholder=\"Your name\" style=\"padding:16px 18px; border-radius:12px; background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.1); color:#e9e9ee; font-size:16px; outline:none;\" style-focus=\"border-color:{{ accentBorder }}\">\n              <input type=\"email\" value=\"{{ callEmail }}\" oninput=\"{{ setCallEmail }}\" placeholder=\"Email\" style=\"padding:16px 18px; border-radius:12px; background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.1); color:#e9e9ee; font-size:16px; outline:none;\" style-focus=\"border-color:{{ accentBorder }}\">\n              <button onclick=\"{{ bookCall }}\" style=\"padding:15px; border-radius:999px; border:none; cursor:pointer; background:linear-gradient(180deg,#ffffff,#cdced6); color:#101013; font-size:14px; font-weight:500; opacity:{{ bookOpacity }}; pointer-events:{{ bookPE }}; box-shadow:0 6px 24px {{ accentGlow }};\">Confirm booking<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fsection>\n      <\u002Fsc-if>\n\n      <!-- ---------- SIGN IN ---------- -->\n      <sc-if value=\"{{ isSignin }}\" hint-placeholder-val=\"{{ false }}\">\n        <section style=\"max-width:420px; margin:0 auto; padding:clamp(60px,12vw,120px) clamp(20px,5vw,40px); min-height:calc(100dvh - 74px); display:flex; flex-direction:column; justify-content:center; gap:26px;\">\n          <div style=\"display:flex; flex-direction:column; gap:10px; text-align:center; align-items:center;\">\n            <svg viewBox=\"92 40 388 280\" width=\"64\" style=\"display:block; overflow:visible;\">\n              <g fill=\"url(#chrome)\" stroke=\"rgba(255,255,255,0.5)\" stroke-width=\"1.4\" stroke-linejoin=\"round\">\n                <path fill-rule=\"evenodd\" d=\"M120,64 H300 A116,116 0 0 1 300,296 H120 Z M176,120 H300 A60,60 0 0 1 300,240 H176 Z\"><\u002Fpath>\n                <path d=\"M380,140 L452,118 L452,242 L380,220 Z\"><\u002Fpath>\n              <\u002Fg>\n            <\u002Fsvg>\n            <h1 style=\"margin:0; font-weight:200; font-size:clamp(26px,5vw,38px);\">Client access<\u002Fh1>\n            <p style=\"margin:0; color:rgba(233,236,248,0.5); font-size:14px;\">We’ll email you a secure link.<\u002Fp>\n          <\u002Fdiv>\n          <sc-if value=\"{{ signedIn }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"padding:22px; border-radius:14px; background:rgba(157,184,255,0.08); border:1px solid {{ accentBorder }}; text-align:center; font-size:14px; color:rgba(233,236,248,0.7);\">Check your inbox — we sent a link to {{ signinEmail }}.<\u002Fdiv>\n          <\u002Fsc-if>\n          <sc-if value=\"{{ notSignedIn }}\" hint-placeholder-val=\"{{ true }}\">\n            <div style=\"display:flex; flex-direction:column; gap:14px;\">\n              <input type=\"email\" value=\"{{ signinEmail }}\" oninput=\"{{ setSigninEmail }}\" placeholder=\"you@company.com\" style=\"padding:16px 18px; border-radius:12px; background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.1); color:#e9e9ee; font-size:16px; outline:none; text-align:center;\" style-focus=\"border-color:{{ accentBorder }}\">\n              <button onclick=\"{{ doSignin }}\" style=\"padding:15px; border-radius:999px; border:none; cursor:pointer; background:linear-gradient(180deg,#ffffff,#cdced6); color:#101013; font-size:14px; font-weight:500; opacity:{{ signinOpacity }}; pointer-events:{{ signinPE }}; box-shadow:0 6px 24px {{ accentGlow }};\">Continue<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fsection>\n      <\u002Fsc-if>\n\n    <\u002Fdiv>\n  <\u002Fmain>\n\n  <!-- ============ LIGHTBOX ============ -->\n  <div onclick=\"{{ closeWork }}\" style=\"position:fixed; inset:0; z-index:70; display:flex; align-items:center; justify-content:center; padding:clamp(16px,5vw,56px); background:rgba(6,6,8,0.9); backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px); opacity:{{ lbOpacity }}; visibility:{{ lbVis }}; pointer-events:{{ lbPE }}; transition:opacity .34s ease, visibility .34s ease;\">\n    <button onclick=\"{{ closeWork }}\" aria-label=\"Close\" style=\"position:absolute; top:max(18px,env(safe-area-inset-top)); right:20px; width:46px; height:46px; background:none; border:none; color:#e9e9ee; font-size:30px; font-weight:200; cursor:pointer; line-height:1; z-index:2;\">×<\u002Fbutton>\n    <sc-if value=\"{{ hasLightbox }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"width:100%; max-width:960px; display:flex; flex-direction:column; gap:18px;\">\n        <div style=\"position:relative; width:100%; border-radius:18px; overflow:hidden; border:1px solid rgba(255,255,255,0.1); background:#0e0e11;\">\n          <sc-if value=\"{{ lb.hasEmbed }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"position:relative; width:100%; aspect-ratio:16/9;\"><iframe src=\"{{ lb.embed }}\" allow=\"autoplay; fullscreen; picture-in-picture\" allowfullscreen=\"true\" style=\"position:absolute; inset:0; width:100%; height:100%; border:0;\"><\u002Fiframe><\u002Fdiv>\n          <\u002Fsc-if>\n          <sc-if value=\"{{ lb.noEmbed }}\" hint-placeholder-val=\"{{ true }}\">\n            <div style=\"position:relative; width:100%; aspect-ratio:16/10;\">\n              <image-slot id=\"{{ lb.id }}\" shape=\"rounded\" radius=\"18\" placeholder=\"{{ lb.placeholder }}\" style=\"position:absolute; inset:0; width:100%; height:100%; display:block;\"><\u002Fimage-slot>\n              <sc-if value=\"{{ lb.filmNoEmbed }}\" hint-placeholder-val=\"{{ false }}\">\n                <span style=\"position:absolute; left:16px; bottom:16px; font-size:12px; letter-spacing:0.04em; color:rgba(255,255,255,0.7); background:rgba(11,11,12,0.6); padding:8px 14px; border-radius:999px; backdrop-filter:blur(6px); -webkit-backdrop-filter:blur(6px); pointer-events:none;\">Add a Vimeo / YouTube link to play the film here<\u002Fspan>\n              <\u002Fsc-if>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n        <div style=\"display:flex; align-items:center; justify-content:space-between; gap:14px; flex-wrap:wrap;\">\n          <span style=\"display:flex; flex-direction:column; gap:4px;\">\n            <span style=\"font-size:clamp(20px,4vw,30px); font-weight:200;\">{{ lb.title }}<\u002Fspan>\n            <span style=\"font-size:11px; letter-spacing:0.2em; color:{{ accent }};\">{{ lb.tag }}<\u002Fspan>\n          <\u002Fspan>\n          <sc-if value=\"{{ lb.hasWatch }}\" hint-placeholder-val=\"{{ false }}\">\n            <a href=\"{{ lb.watch }}\" target=\"_blank\" rel=\"noopener\" onclick=\"{{ stopProp }}\" style=\"display:inline-flex; align-items:center; gap:9px; padding:11px 20px; border-radius:999px; text-decoration:none; background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.18); color:#e9e9ee; font-size:13px; letter-spacing:0.02em; transition:border-color .2s, background .2s;\" style-hover=\"border-color:rgba(255,255,255,0.5); background:rgba(255,255,255,0.1)\">Watch on YouTube <span style=\"font-size:14px;\">↗<\u002Fspan><\u002Fa>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n  <\u002Fdiv>\n\n  <!-- ============ MOBILE MENU ============ -->\n  <div style=\"position:fixed; inset:0; z-index:60; display:flex; flex-direction:column; padding:24px clamp(20px,6vw,40px); background:rgba(8,8,10,0.92); backdrop-filter:blur(18px); -webkit-backdrop-filter:blur(18px); opacity:{{ menuOpacity }}; visibility:{{ menuVis }}; pointer-events:{{ menuPE }}; transition:opacity .3s ease, visibility .3s ease;\">\n    <div style=\"display:flex; justify-content:flex-end;\">\n      <button onclick=\"{{ closeMenu }}\" aria-label=\"Close\" style=\"width:46px; height:46px; background:none; border:none; color:#e9e9ee; font-size:30px; font-weight:200; cursor:pointer; line-height:1;\">×<\u002Fbutton>\n    <\u002Fdiv>\n    <div style=\"flex:1; display:flex; flex-direction:column; justify-content:center; gap:6px;\">\n      <sc-for list=\"{{ menuLinks }}\" as=\"m\" hint-placeholder-count=\"5\">\n        <button onclick=\"{{ m.onClick }}\" style=\"text-align:left; background:none; border:none; cursor:pointer; padding:14px 0; font-size:30px; font-weight:200; color:{{ m.color }}; letter-spacing:-0.01em;\">{{ m.label }}<\u002Fbutton>\n      <\u002Fsc-for>\n      <button onclick=\"{{ goRequest }}\" style=\"margin-top:24px; align-self:flex-start; padding:15px 30px; border-radius:999px; border:none; cursor:pointer; background:linear-gradient(180deg,#ffffff,#cdced6); color:#101013; font-size:15px; font-weight:500; box-shadow:0 8px 30px {{ accentGlow }};\">Start a project<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n<\u002Fdiv>\n\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{\n  &quot;$preview&quot;: { &quot;width&quot;: 1200, &quot;height&quot;: 820 },\n  &quot;studioName&quot;: { &quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;DIA PROD&quot;, &quot;tsType&quot;: &quot;string&quot; },\n  &quot;accent&quot;: { &quot;editor&quot;: &quot;color&quot;, &quot;default&quot;: &quot;#9db8ff&quot;, &quot;options&quot;: [&quot;#9db8ff&quot;, &quot;#c9a9ff&quot;, &quot;#7fe0c4&quot;, &quot;#f0a878&quot;], &quot;tsType&quot;: &quot;string&quot; },\n  &quot;motion&quot;: { &quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: true, &quot;tsType&quot;: &quot;boolean&quot; }\n}\">\nclass Component extends DCLogic {\n  constructor(props){\n    super(props);\n    this.TYPES = [\n      { value:'Video production', desc:'Films, brand stories, content series' },\n      { value:'Photography', desc:'Campaigns, products, portraits' },\n      { value:'Commercials / ads', desc:'Broadcast & social spots' },\n      { value:'Music videos', desc:'Performance & narrative' },\n      { value:'Events', desc:'Live coverage & recap films' },\n      { value:'Corporate / brand films', desc:'Internal & external comms' },\n      { value:'Social media content', desc:'Short-form, vertical, recurring' },\n    ];\n    this.DELIVERABLES = ['Final edit','Raw footage','Color grade','Motion graphics','Social cuts','Stills / photos','Drone','Sound design'];\n    this.BUDGETS = ['Under $5k','$5k – $15k','$15k – $50k','$50k+','Not sure yet'];\n    this.TIMELINES = ['ASAP / rush','In 2–4 weeks','In 1–2 months','Flexible'];\n    this.STAGES = ['Received','In review','In production','Delivered'];\n    this.SLOTS = ['Tue 10:00','Tue 14:00','Wed 11:30','Thu 09:00','Thu 16:00','Fri 13:00'];\n    this.PACKAGES = [\n      { name:'Half Day', price:'from $2,500', presetType:'Photography', points:['Photo or short-form video','One location · up to 4 hours','Edited deliverables in 7 days'] },\n      { name:'Production Day', price:'from $12,000', presetType:'Video production', featured:true, points:['Full crew · one shoot day','Video + stills','Color, edit & sound included'] },\n      { name:'Signature Film', price:'from $40,000', presetType:'Corporate / brand films', points:['Multi-day · concept to delivery','Creative direction & casting','Full post-production'] },\n    ];\n    this.WORK = [\n      { id:'work-1', title:'Aether', tag:'BRAND FILM', cat:'film', embed:'', placeholder:'Drop a poster' },\n      { id:'work-2', title:'Nocturne', tag:'EDITORIAL', cat:'photo', embed:'', placeholder:'Drop a photo' },\n      { id:'work-3', title:'Last Call', tag:'BAR · COMMERCIAL', cat:'film', yt:'WvxYy4n8EYI', placeholder:'Drop a poster' },\n      { id:'work-4', title:'Meridian', tag:'PORTRAIT', cat:'photo', embed:'', placeholder:'Drop a photo' },\n      { id:'work-5', title:'Halcyon', tag:'MUSIC VIDEO', cat:'film', embed:'', placeholder:'Drop a poster' },\n      { id:'work-6', title:'Lumen', tag:'PRODUCT', cat:'photo', embed:'', placeholder:'Drop a photo' },\n      { id:'work-7', title:'Ember', tag:'EVENT FILM', cat:'film', embed:'', placeholder:'Drop a poster' },\n      { id:'work-8', title:'Cascade', tag:'CAMPAIGN', cat:'photo', embed:'', placeholder:'Drop a photo' },\n    ];\n    this.words = ['film','photography','commercial','story','vision'];\n  }\n\n  state = {\n    route:'home', trans:'idle', pendingRoute:null, menuOpen:false,\n    vw: (typeof window!=='undefined' ? window.innerWidth : 1200),\n    step:0, stepPhase:'idle', stepDir:1,\n    draft:this.emptyDraft(), fileNames:[], submitted:false, lastId:null,\n    requests:[], lookup:'', typed:'', wordIdx:0,\n    callSlot:'', callName:'', callEmail:'', callBooked:false,\n    signinEmail:'', signedIn:false,\n    workFilter:'all', lightboxId:null,\n  };\n\n  emptyDraft(){ return { type:'', deliverables:[], budget:'', timeline:'', date:'', location:'', remote:false, brief:'', name:'', email:'', phone:'', company:'' }; }\n\n  componentDidMount(){\n    try { const r = JSON.parse(localStorage.getItem('diaprod.requests')||'[]'); if(Array.isArray(r)) this.setState({requests:r}); } catch(e){}\n    try { const d = JSON.parse(localStorage.getItem('diaprod.draft')||'null'); if(d) this.setState({draft:d}); } catch(e){}\n    this._onResize = () => this.setState({vw:window.innerWidth});\n    window.addEventListener('resize', this._onResize);\n    this._onKey = (e) => { if(e.key==='Escape'){ this.setState({menuOpen:false, lightboxId:null}); } };\n    window.addEventListener('keydown', this._onKey);\n    this.startTyper();\n  }\n  componentWillUnmount(){\n    clearTimeout(this._t); clearTimeout(this._st); clearTimeout(this._ty); clearTimeout(this._tIdle); clearTimeout(this._stIdle);\n    window.removeEventListener('resize', this._onResize);\n    window.removeEventListener('keydown', this._onKey);\n  }\n\n  startTyper(){\n    let wi = 0, i = 0, mode = 'type';\n    const tick = () => {\n      const full = this.words[wi];\n      if(mode==='type'){ i++; this.setState({typed:full.slice(0,i)}); if(i>=full.length){mode='hold'; this._ty=setTimeout(tick,1700); return;} this._ty=setTimeout(tick,90); }\n      else if(mode==='hold'){ mode='del'; this._ty=setTimeout(tick,60); }\n      else { i--; this.setState({typed:full.slice(0,i)}); if(i<=0){ mode='type'; wi=(wi+1)%this.words.length; this._ty=setTimeout(tick,400); return;} this._ty=setTimeout(tick,45); }\n    };\n    this._ty = setTimeout(tick, 700);\n  }\n\n  hexToRgba(hex,a){ const h=(hex||'#9db8ff').replace('#',''); const n=parseInt(h.length===3?h.split('').map(c=>c+c).join(''):h,16); return `rgba(${(n>>16)&255},${(n>>8)&255},${n&255},${a})`; }\n\n  motion(){ return this.props.motion ?? true; }\n\n  go(route){\n    if(route===this.state.route && this.state.trans==='idle'){ this.setState({menuOpen:false}); return; }\n    if(!this.motion()){ this.setState({route, menuOpen:false}); window.scrollTo(0,0); return; }\n    clearTimeout(this._t); clearTimeout(this._tIdle);\n    this.setState({trans:'exit', menuOpen:false});\n    this._t = setTimeout(()=>{\n      window.scrollTo(0,0);\n      this.setState({route, trans:'enter'}, ()=>{\n        requestAnimationFrame(()=>requestAnimationFrame(()=>{ if(this.state.trans==='enter') this.setState({trans:'idle'}); }));\n        // guaranteed fallback in case rAF is throttled/paused (background tab, mobile scroll, low-power)\n        this._tIdle = setTimeout(()=>{ if(this.state.trans!=='idle') this.setState({trans:'idle'}); }, 80);\n      });\n    }, 290);\n  }\n\n  changeStep(n,dir){\n    if(!this.motion()){ this.setState({step:n}); return; }\n    clearTimeout(this._st); clearTimeout(this._stIdle);\n    this.setState({stepPhase:'exit', stepDir:dir});\n    this._st = setTimeout(()=>{\n      this.setState({step:n, stepPhase:'enter'}, ()=>{\n        requestAnimationFrame(()=>requestAnimationFrame(()=>{ if(this.state.stepPhase==='enter') this.setState({stepPhase:'idle'}); }));\n        this._stIdle = setTimeout(()=>{ if(this.state.stepPhase!=='idle') this.setState({stepPhase:'idle'}); }, 70);\n      });\n    }, 240);\n  }\n  nextStep(){ if(this.canProceed() && this.state.step<7) this.changeStep(this.state.step+1, 1); }\n  prevStep(){ if(this.state.step>0) this.changeStep(this.state.step-1, -1); }\n  goStep(n){ this.changeStep(n, n>this.state.step?1:-1); }\n\n  setField(k,v){ this.setState(s=>({draft:{...s.draft,[k]:v}}), ()=>{ try{localStorage.setItem('diaprod.draft', JSON.stringify(this.state.draft));}catch(e){} }); }\n  toggleDeliverable(d){ this.setState(s=>{ const has=s.draft.deliverables.includes(d); const deliverables=has?s.draft.deliverables.filter(x=>x!==d):[...s.draft.deliverables,d]; return {draft:{...s.draft,deliverables}}; }, ()=>{ try{localStorage.setItem('diaprod.draft', JSON.stringify(this.state.draft));}catch(e){} }); }\n\n  onFiles(e){ const names=[...e.target.files].map(f=>f.name); this.setState(s=>({fileNames:[...s.fileNames,...names]})); }\n  removeFile(i){ this.setState(s=>({fileNames:s.fileNames.filter((_,idx)=>idx!==i)})); }\n\n  canProceed(){\n    const d=this.state.draft;\n    switch(this.state.step){\n      case 0: return !!d.type;\n      case 1: return d.deliverables.length>0;\n      case 2: return !!d.budget;\n      case 3: return !!d.timeline;\n      case 4: return d.remote || d.location.trim().length>0;\n      case 5: return d.brief.trim().length>=12;\n      case 6: return d.name.trim().length>0 && /.+@.+\\..+/.test(d.email);\n      default: return true;\n    }\n  }\n\n  submit(){\n    const d=this.state.draft;\n    const id='DIA-'+Math.random().toString(36).slice(2,6).toUpperCase();\n    const rec={ id, type:d.type, deliverables:d.deliverables, budget:d.budget, timeline:d.timeline, date:d.date, location:d.remote?'Remote':d.location, brief:d.brief, name:d.name, email:d.email, phone:d.phone, company:d.company, files:this.state.fileNames, status:'Received', stage:0, created:Date.now() };\n    const requests=[rec, ...this.state.requests];\n    try{ localStorage.setItem('diaprod.requests', JSON.stringify(requests)); localStorage.removeItem('diaprod.draft'); }catch(e){}\n    this.setState({requests, submitted:true, lastId:id, draft:this.emptyDraft(), fileNames:[], step:0});\n    window.scrollTo(0,0);\n  }\n  startAnother(){ this.setState({submitted:false, step:0}); }\n  setFilter(f){ this.setState({workFilter:f}); }\n  openWork(id){ this.setState({lightboxId:id}); }\n  closeWork(){ this.setState({lightboxId:null}); }\n\n  fmtDate(ts){ try{ return new Date(ts).toLocaleDateString(undefined,{month:'short',day:'numeric',year:'numeric'}); }catch(e){ return ''; } }\n\n  renderVals(){\n    const s=this.state;\n    const accent=this.props.accent || '#9db8ff';\n    const accentBorder=this.hexToRgba(accent,0.55);\n    const accentGlow=this.hexToRgba(accent,0.38);\n    const accentSoft=this.hexToRgba(accent,0.10);\n    const fg='#e9e9ee', muted='rgba(233,236,248,0.5)', line='rgba(255,255,255,0.1)', panel='rgba(255,255,255,0.035)';\n    const isDesktop = s.vw>=760;\n    const mo=this.motion();\n\n    const screenStyle = {\n      position:'relative', width:'100%',\n      transition: mo ? 'opacity .42s ease, transform .42s cubic-bezier(.22,.61,.36,1), filter .42s ease' : 'none',\n      opacity: (s.trans==='exit'||s.trans==='enter') ? 0 : 1,\n      transform: s.trans==='exit' ? 'translateY(-10px) scale(.992)' : s.trans==='enter' ? 'translateY(18px) scale(.996)' : 'none',\n      filter: (s.trans==='idle'||!mo) ? 'blur(0px)' : 'blur(8px)',\n    };\n    const exitX = s.stepDir>0?'-42px':'42px';\n    const enterX = s.stepDir>0?'42px':'-42px';\n    const stepStyle = {\n      transition: mo ? 'opacity .4s ease, transform .4s cubic-bezier(.22,.61,.36,1), filter .4s ease' : 'none',\n      opacity: s.stepPhase==='idle' ? 1 : 0,\n      transform: s.stepPhase==='exit' ? `translateX(${exitX})` : s.stepPhase==='enter' ? `translateX(${enterX})` : 'none',\n      filter: s.stepPhase==='idle' ? 'blur(0px)' : 'blur(6px)',\n    };\n\n    const navDef=[['Work','work'],['Packages','packages'],['Track','track'],['Sign in','signin']];\n    const navLinks=navDef.map(([label,r])=>({label, color: s.route===r?fg:'rgba(233,236,248,0.6)', onClick:()=>this.go(r)}));\n    const menuDef=[['Home','home'],['Work','work'],['Packages','packages'],['Track','track'],['Book a call','call'],['Sign in','signin']];\n    const menuLinks=menuDef.map(([label,r])=>({label, color: s.route===r?accent:fg, onClick:()=>this.go(r)}));\n\n    const homeCards=[\n      {kicker:'01',title:'Start a project',desc:'Brief us in a few steps',onClick:()=>this.go('request')},\n      {kicker:'02',title:'View work',desc:'Selected films & photos',onClick:()=>this.go('work')},\n      {kicker:'03',title:'Packages',desc:'Where most projects begin',onClick:()=>this.go('packages')},\n      {kicker:'04',title:'Track a project',desc:'Status of your requests',onClick:()=>this.go('track')},\n    ];\n\n    const sel=(on)=>({border:on?accentBorder:line, bg:on?accentSoft:panel, ring:on?accent:'rgba(255,255,255,0.35)', dot:on?accent:'transparent', dotGlow:on?`0 0 10px ${accentGlow}`:'none'});\n    const typeOptions=this.TYPES.map(t=>({label:t.value, desc:t.desc, ...sel(s.draft.type===t.value), onSelect:()=>this.setField('type',t.value)}));\n    const budgetOptions=this.BUDGETS.map(b=>({label:b, ...sel(s.draft.budget===b), onSelect:()=>this.setField('budget',b)}));\n    const timelineOptions=this.TIMELINES.map(t=>({label:t, ...sel(s.draft.timeline===t), onSelect:()=>this.setField('timeline',t)}));\n    const deliverableOptions=this.DELIVERABLES.map(d=>{ const on=s.draft.deliverables.includes(d); return {label:d, border:on?accentBorder:line, bg:on?accentSoft:'transparent', text:on?fg:muted, onToggle:()=>this.toggleDeliverable(d)}; });\n\n    const kickers=['01 — Project','02 — Deliverables','03 — Budget','04 — Timeline','05 — Location','06 — Brief','07 — Contact','08 — Review'];\n    const titles=['What are we creating?','What do you need delivered?','What\\u2019s your budget?','When do you need it?','Where does it happen?','Tell us about it.','How do we reach you?','Ready to send?'];\n\n    const d=s.draft;\n    const reviewItems=[\n      {label:'PROJECT', value:d.type||'\\u2014', onEdit:()=>this.goStep(0)},\n      {label:'DELIVERABLES', value:d.deliverables.length?d.deliverables.join(', '):'\\u2014', onEdit:()=>this.goStep(1)},\n      {label:'BUDGET', value:d.budget||'\\u2014', onEdit:()=>this.goStep(2)},\n      {label:'TIMELINE', value:(d.timeline||'\\u2014')+(d.date?` · ${d.date}`:''), onEdit:()=>this.goStep(3)},\n      {label:'LOCATION', value:d.remote?'Remote / flexible':(d.location||'\\u2014'), onEdit:()=>this.goStep(4)},\n      {label:'BRIEF', value:d.brief?(d.brief.length>90?d.brief.slice(0,90)+'\\u2026':d.brief):'\\u2014', onEdit:()=>this.goStep(5)},\n      {label:'CONTACT', value:[d.name,d.email].filter(Boolean).join(' · ')||'\\u2014', onEdit:()=>this.goStep(6)},\n    ];\n\n    const canGo=this.canProceed();\n    const packages=this.PACKAGES.map(p=>({\n      name:p.name, price:p.price, points:p.points, featured:!!p.featured,\n      bg: p.featured?'rgba(157,184,255,0.06)':panel,\n      border: p.featured?accentBorder:line,\n      shadow: p.featured?`0 18px 60px ${this.hexToRgba(accent,0.14)}`:'none',\n      btnBg: p.featured?'linear-gradient(180deg,#ffffff,#cdced6)':'transparent',\n      btnBorder: p.featured?'transparent':'rgba(255,255,255,0.18)',\n      btnColor: p.featured?'#101013':fg,\n      onChoose:()=>{ this.setState(st=>({draft:{...st.draft,type:p.presetType}, submitted:false, step:0}), ()=>{ try{localStorage.setItem('diaprod.draft', JSON.stringify(this.state.draft));}catch(e){} this.go('request'); }); },\n    }));\n\n    const lk=s.lookup.trim().toUpperCas
