document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    // Nested page bundles (iframe targets). Each ships ONCE, in the ROOT
    // document's manifest; frame srcs carry an about:blank#<uuid> marker
    // instead of a substitutable uuid. Every document mints the blobs for
    // its OWN frames — from local text at the root, or text obtained from
    // its DIRECT parent over the relay protocol below — so each frame
    // navigation stays same-origin with its initiator and a deduped page
    // loads at any depth on any host, including a file:// download's
    // opaque origins (where a blob minted by one document cannot be
    // navigated to by another).
    const pageOrderEl = document.querySelector('script[type="__bundler/page_order"]');
    const pageOrder = pageOrderEl ? JSON.parse(pageOrderEl.textContent) : [];
    const pageSet = new Set(pageOrder);
    const pageTexts = {};

    // ── Nested-page text protocol (parent-chain relay) ──
    // Page bundles ship once, in the ROOT document's manifest. Every
    // document mints the blobs for its OWN frames, obtaining page text
    // through a strict parent-chain relay: a document only ever SENDS to
    // its direct parent (which, for every document the publisher's own
    // runtime minted, is another publisher document) and only ACCEPTS
    // text from that direct parent; requests from below are honored only
    // for the document's own child frames, and the ROOT never sends
    // upward at all. That last rule is load-bearing: the artifact host's
    // frame-ancestors allows claude.ai (and friends) to frame an
    // artifact, so window.top can be a FOREIGN document — a top-addressed
    // protocol would hand page uuids to that ancestor and accept forged
    // "page text" from it, minting attacker HTML as an artifact-origin
    // blob document. The chain never touches the ancestor: requests stop
    // at the root, replies are origin-addressed per hop (never '*' when
    // an origin exists), and both directions are origin-gated (on https
    // a foreign sender's origin can never equal this document's; in
    // opaque contexts — file:// — everything serializes as 'null', where
    // an embedded EXTERNAL frame still fails the gate by carrying its
    // own real origin, and a sandboxed child of such a frame is excluded
    // by the own-child-frames check plus uuid unguessability). Shape is
    // deny-by-default: one request form, one reply form, no error
    // replies.
    // window.origin is the SERIALIZED SECURITY origin ('null' in opaque
    // contexts such as a sandboxed preview iframe) — location.origin is
    // computed from the URL and stays 'https://…' even when the document
    // is sandboxed, which would misgate every opaque chain.
    const OWN_TARGET = /^https?:[/][/]/.test(window.origin || '')
      ? window.origin
      : '*';
    function trustedOrigin(e) {
      if (e.origin === window.origin) return true; // https chains; opaque==opaque
      // file:// trees: Chrome serializes the file document's origin as
      // 'file://' while the blob: documents it mints serialize as 'null',
      // so the two legitimate shapes can never string-match — accept the
      // pair in both directions. https origins never serialize as either,
      // and sender identity (own child frame / direct parent) is checked
      // separately.
      return (
        (e.origin === 'null' &&
          (window.origin === 'file://' ||
            window.location.protocol === 'file:')) ||
        (/^file:/.test(e.origin) && window.origin === 'null')
      );
    }
    // Non-empty only in the root document (nested bundles ship an empty
    // island), so it doubles as the root marker: the root answers from
    // local text and treats a miss as authoritative — never relaying to
    // its (possibly foreign) parent.
    const isPageRoot = pageOrder.length > 0;
    const blobUrls = {};
    const resourceBlobs = {};
    const UUID_SHAPE = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/;
    const pendingFrames = {}; // uuid -> [{el, frag}] awaiting text for own frames
    const pendingRelays = {}; // uuid -> [childWindow] awaiting text to pass down
    function mountPage(el, frag, text) {
      const pageBlob = new Blob([text], { type: 'text/html' });
      const u = URL.createObjectURL(pageBlob);
      resourceBlobs[u] = pageBlob;
      el.src = u + frag;
    }
    function deliverPage(uuid, text) {
      const frames = pendingFrames[uuid];
      delete pendingFrames[uuid];
      if (frames) for (const f of frames) mountPage(f.el, f.frag, text);
      const relays = pendingRelays[uuid];
      delete pendingRelays[uuid];
      if (relays) {
        for (const cw of relays) {
          try { cw.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
        }
      }
    }
    function ownFrameWindows() {
      const out = [];
      for (const f of Array.from(document.querySelectorAll('iframe'))) {
        try { if (f.contentWindow) out.push(f.contentWindow); } catch (err) { /* detached */ }
      }
      return out;
    }
    window.addEventListener('message', function (e) {
      const d = e.data;
      if (!d || typeof d !== 'object' || !e.source) return;
      // Origin gate first; the structural checks below (own-child-frames
      // for requests, direct-parent + solicited-uuid for replies, the
      // root's never-relay rule) are what hold in fully opaque chains
      // where origin strings can't discriminate — a sandboxed root's
      // FOREIGN wrapper still fails all three even though both serialize
      // as real-vs-'null' rather than matching.
      if (!trustedOrigin(e)) return;
      if (typeof d.__bundler_need === 'string' && UUID_SHAPE.test(d.__bundler_need)) {
        // Requests are honored only for this document's own child frames.
        if (ownFrameWindows().indexOf(e.source) < 0) return;
        const uuid = d.__bundler_need;
        const text = pageTexts[uuid];
        if (typeof text === 'string') {
          try { e.source.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
          return;
        }
        if (isPageRoot || window.parent === window) return; // authoritative miss
        const waiting = pendingRelays[uuid];
        if (waiting) {
          if (waiting.indexOf(e.source) < 0) waiting.push(e.source);
          return;
        }
        // Never-answered uuids would otherwise accumulate forever under a
        // request spray; past the cap (far above any real page count) new
        // relays are dropped rather than remembered.
        if (Object.keys(pendingRelays).length >= 128) return;
        pendingRelays[uuid] = [e.source];
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      } else if (
        typeof d.__bundler_page === 'string' &&
        UUID_SHAPE.test(d.__bundler_page) &&
        typeof d.__bundler_text === 'string'
      ) {
        // The shape test is load-bearing beyond tidiness: the solicited
        // check below uses the in operator, which matches prototype keys
        // ('__proto__', 'constructor') — an unshaped key would reach
        // deliverPage and throw, painting the error banner.
        // Text is accepted only from the direct parent — the document
        // that minted this one.
        if (e.source !== window.parent || window.parent === window) return;
        if (!(d.__bundler_page in pendingFrames) && !(d.__bundler_page in pendingRelays)) return;
        deliverPage(d.__bundler_page, d.__bundler_text);
      }
    });

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (pageSet.has(uuid)) {
          pageTexts[uuid] = new TextDecoder().decode(finalBytes);
          return;
        }
        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    // Page uuids have no blob here — they ride inside about:blank#<uuid>
    // frame markers the pass below resolves after the swap.
    for (const uuid of uuids) {
      if (pageSet.has(uuid)) continue;
      template = template.split(uuid).join(blobUrls[uuid]);
    }

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);

    // Resolve page-frame markers: mint this document's own blob for each
    // framed page — from local text when this is the root, otherwise by
    // asking the direct parent over the relay protocol above. An
    // unanswered request leaves the frame on about:blank, the same
    // degraded state as a refused embed.
    {
      const MARKER = /^about:blank#([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})(#.*)?$/;
      const needed = [];
      for (const el of Array.from(document.querySelectorAll('iframe'))) {
        const m = MARKER.exec(el.getAttribute('src') || '');
        if (!m) continue;
        const text = pageTexts[m[1]];
        if (typeof text === 'string') {
          mountPage(el, m[2] || '', text);
        } else if (window.parent !== window && !isPageRoot) {
          const had = pendingFrames[m[1]];
          (pendingFrames[m[1]] = had || []).push({ el: el, frag: m[2] || '' });
          if (!had) needed.push(m[1]);
        }
      }
      for (const uuid of needed) {
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      }
    }

    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

r=\"transform:translateY(-6px)\">\n                    <div style=\"width:100%; aspect-ratio:1/1; max-width:130px; opacity:0.72; animation:floatY {{ a.floatDur }} ease-in-out infinite; animation-delay:{{ a.floatDelay }};\">\n                      <image-slot id=\"{{ a.slotId }}\" shape=\"rect\" placeholder=\"{{ a.placeholder }}\" style=\"width:100%; height:100%; display:block;\"><\u002Fimage-slot>\n                    <\u002Fdiv>\n                    <span style=\"font-size:11px; font-weight:600; letter-spacing:0.08em; text-transform:uppercase; color:rgba(20,20,24,0.6); text-align:center;\">{{ a.name }}<\u002Fspan>\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsection>\n\n          <!-- ===== CASE STUDIES (light, scroll-reveal) ===== -->\n          <section data-screen-label=\"Case studies\" style=\"position:relative; z-index:2; background:#eae8e1; color:#141418; padding:clamp(70px,10vw,150px) clamp(18px,5vw,64px);\">\n            <div style=\"max-width:1440px; margin:0 auto;\">\n              <div data-reveal=\"\" style=\"display:flex; flex-direction:column; gap:14px; max-width:52ch; margin-bottom:clamp(48px,7vw,96px);\">\n                <span style=\"font-size:12px; font-weight:600; letter-spacing:0.24em; text-transform:uppercase; color:{{ accentInk }};\">{{ t.casesKicker }}<\u002Fspan>\n                <h2 style=\"margin:0; font-family:'Archivo Expanded','Archivo',sans-serif; font-weight:800; text-transform:uppercase; font-size:clamp(30px,5.2vw,74px); line-height:0.9; letter-spacing:-0.02em;\">{{ t.casesTitle }}<\u002Fh2>\n                <p style=\"margin:8px 0 0; font-size:clamp(15px,1.8vw,19px); line-height:1.6; color:rgba(20,20,24,0.62);\">{{ t.casesSub }}<\u002Fp>\n              <\u002Fdiv>\n              <div style=\"display:flex; flex-direction:column; gap:clamp(56px,8vw,120px);\">\n                <sc-for list=\"{{ caseStudies }}\" as=\"cs\" hint-placeholder-count=\"3\">\n                  <div data-reveal-clip=\"\" style=\"display:grid; grid-template-columns:{{ cs.cols }}; gap:clamp(28px,4vw,64px); align-items:center;\">\n                    <button onclick=\"{{ cs.onOpen }}\" class=\"zoom-media\" style=\"order:{{ cs.mediaOrder }}; position:relative; border:none; padding:0; cursor:pointer; background:none; border-radius:16px; overflow:hidden;\">\n                      <div style=\"position:relative; width:100%; aspect-ratio:4/3; border-radius:16px; overflow:hidden; box-shadow:0 30px 70px rgba(0,0,0,0.22);\">\n                        <image-slot id=\"{{ cs.slotId }}\" shape=\"rect\" placeholder=\"{{ cs.placeholder }}\" style=\"position:absolute; inset:0; width:100%; height:100%; display:block;\"><\u002Fimage-slot>\n                      <\u002Fdiv>\n                    <\u002Fbutton>\n                    <div style=\"order:{{ cs.textOrder }}; display:flex; flex-direction:column; gap:18px;\">\n                      <span style=\"font-size:11px; font-weight:600; letter-spacing:0.2em; text-transform:uppercase; color:{{ accentInk }};\">{{ cs.cat }}<\u002Fspan>\n                      <h3 style=\"margin:0; font-family:'Archivo Expanded','Archivo',sans-serif; font-weight:800; text-transform:uppercase; font-size:clamp(24px,3.2vw,44px); line-height:0.95; letter-spacing:-0.02em;\">{{ cs.client }}<\u002Fh3>\n                      <p style=\"margin:0; font-size:clamp(15px,1.6vw,18px); line-height:1.6; color:rgba(20,20,24,0.66); max-width:42ch;\">{{ cs.result }}<\u002Fp>\n                      <div style=\"display:flex; align-items:baseline; gap:14px; margin-top:6px;\">\n                        <span style=\"font-family:'Archivo Expanded','Archivo',sans-serif; font-weight:900; font-size:clamp(34px,5vw,64px); line-height:1; letter-spacing:-0.02em;\">{{ cs.metric }}<\u002Fspan>\n                        <span style=\"font-size:12px; font-weight:600; letter-spacing:0.1em; text-transform:uppercase; color:rgba(20,20,24,0.55);\">{{ cs.metricLabel }} ---------- REQUEST ---------- -->\n      <sc-if value=\"{{ isRequest }}\" hint-placeholder-val=\"{{ false }}\">\n\n        <sc-if value=\"{{ notSubmitted }}\" hint-placeholder-val=\"{{ true }}\">\n          <section data-screen-label=\"Request\" style=\"max-width:720px; margin:0 auto; padding:clamp(28px,5vw,52px) clamp(20px,5vw,40px) 60px; min-height:calc(100dvh - 74px); display:flex; flex-direction:column;\">\n            <div style=\"margin-bottom:30px;\">\n              <div style=\"display:flex; justify-content:space-between; align-items:baseline; margin-bottom:12px;\">\n                <span style=\"font-size:11px; letter-spacing:0.3em; color:{{ accent }}; font-weight:400;\">{{ stepKicker }}<\u002Fspan>\n                <span style=\"font-size:11px; letter-spacing:0.2em; color:rgba(233,236,248,0.4);\">{{ stepCounter }}<\u002Fspan>\n              <\u002Fdiv>\n              <div style=\"height:2px; border-radius:2px; background:rgba(255,255,255,0.09); overflow:hidden;\">\n                <div style=\"height:100%; width:{{ progressPct }}; background:linear-gradient(90deg,{{ accent }},#ffffff); border-radius:2px; box-shadow:0 0 12px {{ accentGlow }}; transition:width .45s cubic-bezier(.22,.61,.36,1);\"><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n\n            <div style=\"flex:1;\">\n              <div style=\"{{ stepStyle }}\">\n                <h2 style=\"margin:0 0 28px; font-weight:200; font-size:clamp(26px,4.6vw,40px); letter-spacing:-0.01em;\">{{ stepTitle }}<\u002Fh2>\n\n                <sc-if value=\"{{ isStep0 }}\" hint-placeholder-val=\"{{ true }}\">\n                  <div style=\"display:flex; flex-direction:column; gap:11px;\">\n                    <sc-for list=\"{{ typeOptions }}\" as=\"opt\" hint-placeholder-count=\"7\">\n                      <button onclick=\"{{ opt.onSelect }}\" style=\"display:flex; align-items:center; gap:16px; width:100%; text-align:left; padding:17px 20px; border-radius:14px; cursor:pointer; color:#e9e9ee; border:1px solid {{ opt.border }}; background:{{ opt.bg }}; transition:border-color .25s, background .25s;\">\n                        <span style=\"position:relative; flex:0 0 auto; width:22px; height:22px; border-radius:50%; border:1.5px solid {{ opt.ring }}; display:flex; align-items:center; justify-content:center; transition:border-color .25s;\">\n                          <span style=\"width:9px; height:9px; border-radius:50%; background:{{ opt.dot }}; box-shadow:{{ opt.dotGlow }}; transition:all .25s;\"><\u002Fspan>\n                        <\u002Fspan>\n                        <span style=\"display:flex; flex-direction:column; gap:3px;\">\n                          <span style=\"font-size:15px; font-weight:400;\">{{ opt.label }}<\u002Fspan>\n                          <span style=\"font-size:12.5px; color:rgba(233,236,248,0.5); font-weight:300;\">{{ opt.desc }}<\u002Fspan>\n                        <\u002Fspan>\n                      <\u002Fbutton>\n                    <\u002Fsc-for>\n                  <\u002Fdiv>\n                <\u002Fsc-if>\n\n                <sc-if value=\"{{ isStep1 }}\" hint-placeholder-val=\"{{ false }}\">\n                  <div style=\"display:flex; flex-wrap:wrap; gap:11px;\">\n                    <sc-for list=\"{{ deliverableOptions }}\" as=\"opt\" hint-placeholder-count=\"8\">\n                      <button onclick=\"{{ opt.onToggle }}\" style=\"padding:12px 19px; border-radius:999px; cursor:pointer; font-size:13.5px; letter-spacing:0.02em; border:1px solid {{ opt.border }}; background:{{ opt.bg }}; color:{{ opt.text }}; transition:all .2s;\">{{ opt.label }}<\u002Fbutton>\n                    <\u002Fsc-for>\n                  <\u002Fdiv>\n                <\u002Fsc-if>\n\n                <sc-if value=\"{{ isStep2 }}\" hint-placeholder-val=\"{{ false }}\">\n                  <div style=\"display:flex; flex-direction:column; gap:11px;\">\n                    <sc-for list=\"{{ budgetOptions }}\" as=\"opt\" hint-placeholder-count=\"5\">\n                      <button onclick=\"{{ opt.onSelect }}\" style=\"display:flex; align-items:center; gap:16px; width:100%; text-align:left; padding:17px 20px; border-radius:14px; cursor:pointer; color:#e9e9ee; border:1px solid {{ opt.border }}; background:{{ opt.bg }}; transition:border-color .25s, background .25s;\">\n                        <span style=\"position:relative; flex:0 0 auto; width:22px; height:22px; border-radius:50%; border:1.5px solid {{ opt.ring }}; display:flex; align-items:center; justify-content:center;\">\n                          <span style=\"width:9px; height:9px; border-radius:50%; background:{{ opt.dot }}; box-shadow:{{ opt.dotGlow }}; transition:all .25s;\"><\u002Fspan>\n                        <\u002Fspan>\n                        <span style=\"font-size:15px; font-weight:400;\">{{ opt.label }}<\u002Fspan>\n                      <\u002Fbutton>\n                    <\u002Fsc-for>\n                  <\u002Fdiv>\n                <\u002Fsc-if>\n\n                <sc-if value=\"{{ isStep3 }}\" hint-placeholder-val=\"{{ false }}\">\n                  <div style=\"display:flex; flex-direction:column; gap:11px;\">\n                    <sc-for list=\"{{ timelineOptions }}\" as=\"opt\" hint-placeholder-count=\"4\">\n                      <button onclick=\"{{ opt.onSelect }}\" style=\"display:flex; align-items:center; gap:16px; width:100%; text-align:left; padding:17px 20px; border-radius:14px; cursor:pointer; color:#e9e9ee; border:1px solid {{ opt.border }}; background:{{ opt.bg }}; transition:border-color .25s, background .25s;\">\n                        <span style=\"position:relative; flex:0 0 auto; width:22px; height:22px; border-radius:50%; border:1.5px solid {{ opt.ring }}; display:flex; align-items:center; justify-content:center;\">\n                          <span style=\"width:9px; height:9px; border-radius:50%; background:{{ opt.dot }}; box-shadow:{{ opt.dotGlow }}; transition:all .25s;\"><\u002Fspan>\n                        <\u002Fspan>\n                        <span style=\"font-size:15px; font-weight:400;\">{{ opt.label }}<\u002Fspan>\n                      <\u002Fbutton>\n                    <\u002Fsc-for>\n                    <label style=\"display:flex; flex-direction:column; gap:8px; margin-top:8px;\">\n                      <span style=\"font-size:12px; letter-spacing:0.14em; color:rgba(233,236,248,0.45);\">TARGET DATE (OPTIONAL)<\u002Fspan>\n                      <input type=\"date\" value=\"{{ draftDate }}\" oninput=\"{{ setDate }}\" style=\"padding:14px 16px; border-radius:12px; background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.1); color:#e9e9ee; font-size:15px; outline:none; color-scheme:dark;\" style-focus=\"border-color:{{ accentBorder }}\">\n                    <\u002Flabel>\n                  <\u002Fdiv>\n                <\u002Fsc-if>\n\n                <sc-if value=\"{{ isStep4 }}\" hint-placeholder-val=\"{{ false }}\">\n                  <div style=\"display:flex; flex-direction:column; gap:16px;\">\n                    <input type=\"text\" value=\"{{ draftLocation }}\" oninput=\"{{ setLocation }}\" placeholder=\"City, venue, or studio\" style=\"padding:16px 18px; border-radius:12px; background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.1); color:#e9e9ee; font-size:16px; outline:none;\" style-focus=\"border-color:{{ accentBorder }}\">\n                    <button onclick=\"{{ toggleRemote }}\" style=\"align-self:flex-start; display:flex; align-items:center; gap:12px; padding:12px 18px; border-radius:999px; cursor:pointer; border:1px solid {{ remoteBorder }}; background:{{ remoteBg }}; color:{{ remoteText }}; font-size:13.5px; transition:all .2s;\">\n                      <span style=\"width:16px; height:16px; border-radius:5px; border:1.5px solid {{ remoteRing }}; background:{{ remoteFill }}; display:flex; align-items:center; justify-content:center; font-size:11px; color:#101013;\">{{ remoteCheck }}<\u002Fspan>\n                      Remote / flexible location\n                    <\u002Fbutton>\n                  <\u002Fdiv>\n                <\u002Fsc-if>\n\n                <sc-if value=\"{{ isStep5 }}\" hint-placeholder-val=\"{{ false }}\">\n                  <div style=\"display:flex; flex-direction:column; gap:18px;\">\n                    <textarea value=\"{{ draftBrief }}\" oninput=\"{{ setBrief }}\" rows=\"5\" placeholder=\"What's the story, mood, and goal? Anything we should know.\" style=\"padding:16px 18px; border-radius:14px; background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.1); color:#e9e9ee; font-size:15px; line-height:1.6; outline:none; min-height:140px;\" style-focus=\"border-color:{{ accentBorder }}\"><\u002Ftextarea>\n                    <label style=\"display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px; padding:26px; border-radius:14px; border:1.5px dashed rgba(255,255,255,0.16); cursor:pointer; text-align:center; transition:border-color .25s, background .25s;\" style-hover=\"border-color:{{ accentBorder }}; background:rgba(255,255,255,0.03)\">\n                      <span style=\"font-size:14px; color:#e9e9ee;\">Drop reference files<\u002Fspan>\n                      <span style=\"font-size:12px; color:rgba(233,236,248,0.45);\">images, decks, links — optional<\u002Fspan>\n                      <input type=\"file\" multiple=\"\" onchange=\"{{ onFiles }}\" style=\"display:none;\">\n                    <\u002Flabel>\n                    <sc-if value=\"{{ hasFiles }}\" hint-placeholder-val=\"{{ false }}\">\n                      <div style=\"display:flex; flex-wrap:wrap; gap:9px;\">\n                        <sc-for list=\"{{ fileChips }}\" as=\"f\" hint-placeholder-count=\"2\">\n                          <span style=\"display:flex; align-items:center; gap:9px; padding:8px 13px; border-radius:999px; background:rgba(157,184,255,0.1); border:1px solid {{ accentBorder }}; font-size:12.5px; color:#e9e9ee;\">{{ f.name }}<button onclick=\"{{ f.onRemove }}\" style=\"background:none; border:none; color:rgba(233,236,248,0.6); cursor:pointer; font-size:15px; line-height:1; padding:0;\">×<\u002Fbutton><\u002Fspan>\n                        <\u002Fsc-for>\n                      <\u002Fdiv>\n                    <\u002Fsc-if>\n                  <\u002Fdiv>\n                <\u002Fsc-if>\n\n                <sc-if value=\"{{ isStep6 }}\" hint-placeholder-val=\"{{ false }}\">\n                  <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:14px;\">\n                    <input type=\"text\" value=\"{{ draftName }}\" oninput=\"{{ setName }}\" placeholder=\"Full name\" style=\"grid-column:1/-1; padding:16px 18px; border-radius:12px; background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.1); color:#e9e9ee; font-size:16px; outline:none;\" style-focus=\"border-color:{{ accentBorder }}\">\n                    <input type=\"email\" value=\"{{ draftEmail }}\" oninput=\"{{ setEmail }}\" placeholder=\"Email\" style=\"padding:16px 18px; border-radius:12px; background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.1); color:#e9e9ee; font-size:16px; outline:none;\" style-focus=\"border-color:{{ accentBorder }}\">\n                    <input type=\"tel\" value=\"{{ draftPhone }}\" oninput=\"{{ setPhone }}\" placeholder=\"Phone (optional)\" style=\"padding:16px 18px; border-radius:12px; background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.1); color:#e9e9ee; font-size:16px; outline:none;\" style-focus=\"border-color:{{ accentBorder }}\">\n                    <input type=\"text\" value=\"{{ draftCompany }}\" oninput=\"{{ setCompany }}\" placeholder=\"Company / brand (optional)\" style=\"grid-column:1/-1; padding:16px 18px; border-radius:12px; background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.1); color:#e9e9ee; font-size:16px; outline:none;\" style-focus=\"border-color:{{ accentBorder }}\">\n                  <\u002Fdiv>\n                <\u002Fsc-if>\n\n                <sc-if value=\"{{ isStep7 }}\" hint-placeholder-val=\"{{ false }}\">\n                  <div style=\"display:flex; flex-direction:column; gap:2px; border-radius:16px; overflow:hidden; border:1px solid rgba(255,255,255,0.09);\">\n                    <sc-for list=\"{{ reviewItems }}\" as=\"r\" hint-placeholder-count=\"6\">\n                      <button onclick=\"{{ r.onEdit }}\" style=\"display:flex; align-items:center; justify-content:space-between; gap:16px; text-align:left; padding:16px 20px; cursor:pointer; background:rgba(255,255,255,0.025); border:none; color:#e9e9ee; transition:background .2s;\" style-hover=\"background:rgba(255,255,255,0.05)\">\n                        <span style=\"display:flex; flex-direction:column; gap:4px;\">\n                          <span style=\"font-size:11px; letter-spacing:0.2em; color:rgba(233,236,248,0.42);\">{{ r.label }}<\u002Fspan>\n                          <span style=\"font-size:15px; font-weight:300;\">{{ r.value }}<\u002Fspan>\n                        <\u002Fspan>\n                        <span style=\"font-size:12px; color:{{ accent }}; letter-spacing:0.1em;\">EDIT<\u002Fspan>\n                      <\u002Fbutton>\n                    <\u002Fsc-for>\n                  <\u002Fdiv>\n                <\u002Fsc-if>\n              <\u002Fdiv>\n            <\u002Fdiv>\n\n            <div style=\"display:flex; align-items:center; justify-content:space-between; gap:16px; margin-top:36px; padding-top:22px; border-top:1px solid rgba(255,255,255,0.07);\">\n              <button onclick=\"{{ onBack }}\" style=\"background:none; border:none; cursor:pointer; padding:12px 6px; font-size:14px; color:{{ backColor }}; letter-spacing:0.04em; transition:color .2s; pointer-events:{{ backPE }};\">← Back<\u002Fbutton>\n              <sc-if value=\"{{ showContinue }}\" hint-placeholder-val=\"{{ true }}\">\n                <button onclick=\"{{ onContinue }}\" style=\"padding:15px 34px; border-radius:999px; border:none; cursor:pointer; background:linear-gradient(180deg,#ffffff,#cdced6); color:#101013; font-size:14px; font-weight:500; letter-spacing:0.04em; opacity:{{ continueOpacity }}; pointer-events:{{ continuePE }}; box-shadow:0 6px 24px {{ accentGlow }}; transition:opacity .25s, transform .25s;\" style-hover=\"transform:translateY(-1px)\">Continue<\u002Fbutton>\n              <\u002Fsc-if>\n              <sc-if value=\"{{ showSubmit }}\" hint-placeholder-val=\"{{ false }}\">\n                <button onclick=\"{{ submit }}\" style=\"padding:15px 36px; border-radius:999px; border:none; cursor:pointer; background:linear-gradient(180deg,#ffffff,#cdced6); color:#101013; font-size:14px; font-weight:600; letter-spacing:0.04em; box-shadow:0 0 0 1px rgba(255,255,255,0.4), 0 8px 30px {{ accentGlow }}; transition:transform .25s;\" style-hover=\"transform:translateY(-1px)\">Submit request<\u002Fbutton>\n              <\u002Fsc-if>\n            <\u002Fdiv>\n          <\u002Fsection>\n        <\u002Fsc-if>\n\n        <sc-if value=\"{{ submitted }}\" hint-placeholder-val=\"{{ false }}\">\n          <section data-screen-label=\"Request submitted\" style=\"max-width:560px; margin:0 auto; padding:clamp(60px,12vw,120px) clamp(20px,5vw,40px); min-height:calc(100dvh - 74px); display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; gap:26px;\">\n            <svg sc-camel-view-box=\"250 250 540 470\" width=\"120\" style=\"display:block; overflow:visible; animation:diaGlow 3.6s ease-in-out infinite;\">\n              <rect x=\"250\" y=\"250\" width=\"540\" height=\"470\" fill=\"url(#chrome)\" mask=\"url(#diaLogoMask)\"><\u002Frect>\n            <\u002Fsvg>\n            <h2 style=\"margin:0; font-weight:200; font-size:clamp(28px,5vw,42px);\">Request received<\u002Fh2>\n            <p style=\"margin:0; color:rgba(233,236,248,0.6); font-size:16px; line-height:1.7; max-width:38ch;\">Thanks{{ submittedName }}. Our producers will review your brief and reply within one business day.<\u002Fp>\n            <div style=\"display:flex; flex-direction:column; gap:6px; padding:18px 28px; border-radius:14px; background:rgba(255,255,255,0.04); border:1px solid {{ accentBorder }};\">\n              <span style=\"font-size:11px; letter-spacing:0.24em; color:rgba(233,236,248,0.45);\">YOUR REFERENCE<\u002Fspan>\n              <span style=\"font-size:22px; font-weight:400; letter-spacing:0.14em; color:{{ accent }};\">{{ lastId }}<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"display:flex; flex-wrap:wrap; gap:12px; justify-content:center; margin-top:6px;\">\n              <button onclick=\"{{ goTrack }}\" style=\"padding:14px 28px; border-radius:999px; border:none; cursor:pointer; background:linear-gradient(180deg,#ffffff,#cdced6); color:#101013; font-size:14px; font-weight:500;\">Track this project<\u002Fbutton>\n              <button onclick=\"{{ startAnother }}\" style=\"padding:14px 28px; border-radius:999px; cursor:pointer; background:transparent; border:1px solid rgba(255,255,255,0.18); color:#e9e9ee; font-size:14px;\">Start another<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fsection>\n        <\u002Fsc-if>\n      <\u002Fsc-if>\n\n      <!-- ---------- WORK ---------- -->\n      <!-- ---------- PORTFOLIO ---------- -->\n      <sc-if value=\"{{ isWork }}\" hint-placeholder-val=\"{{ false }}\">\n        <section data-screen-label=\"Portfolio\" style=\"position:relative;\">\n\n          <!-- giant repeating marquee headline -->\n          <div aria-hidden=\"true\" style=\"position:relative; z-index:2; overflow:hidden; padding:clamp(14px,2.4vw,30px) 0; border-bottom:1px solid rgba(255,255,255,0.08); -webkit-mask:linear-gradient(90deg,transparent,#000 4%,#000 96%,transparent); mask:linear-gradient(90deg,transparent,#000 4%,#000 96%,transparent);\">\n            <div style=\"display:flex; align-items:center; width:max-content; animation:{{ marqueeAnim }};\">\n              <sc-for list=\"{{ workMarqueeItems }}\" as=\"w\" hint-placeholder-count=\"8\">\n                <span style=\"display:inline-flex; align-items:center; flex:0 0 auto; padding:0 clamp(24px,3vw,52px); font-family:'Archivo Expanded','Archivo',sans-serif; font-weight:900; text-transform:uppercase; font-size:clamp(44px,8vw,120px); line-height:1; letter-spacing:-0.02em; color:#f4f4f7;\">{{ w }}<\u002Fspan>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"max-width:1440px; margin:0 auto; padding:clamp(20px,3vw,34px) clamp(18px,5vw,64px) clamp(60px,9vw,110px);\">\n            <!-- top info strip -->\n            <div style=\"display:grid; grid-template-columns:{{ portfolioStripCols }}; gap:14px; margin-bottom:14px;\">\n              <div style=\"display:flex; align-items:center; padding:20px 24px; border-radius:16px; background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.08);\">\n                <span style=\"font-style:italic; font-size:15px; line-height:1.5; color:rgba(233,236,248,0.82);\">{{ t.pfQuote }}<\u002Fspan>\n              <\u002Fdiv>\n              <button onclick=\"{{ shuffleWork }}\" style=\"display:flex; align-items:center; justify-content:center; gap:12px; padding:20px 24px; border-radius:16px; cursor:pointer; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); color:#f4f4f7; transition:border-color .25s, background .25s;\" style-hover=\"border-color:{{ accentBorder }}; background:rgba(255,255,255,0.08)\">\n                <span style=\"display:inline-flex; align-items:center; justify-content:center; width:34px; height:34px; border-radius:9px; background:{{ accent }}; color:#0b0b0e; font-size:17px;\">⚄<\u002Fspan>\n                <span style=\"font-size:14px; font-weight:600; letter-spacing:0.02em;\">{{ t.pfShuffle }}<\u002Fspan>\n              <\u002Fbutton>\n              <div style=\"display:flex; align-items:center; padding:20px 24px; border-radius:16px; background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.08);\">\n                <span style=\"font-size:14px; line-height:1.5; color:rgba(233,236,248,0.72);\">{{ t.pfBlurb }}<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fdiv>\n\n            <!-- info sidebar + grid -->\n            <div style=\"display:grid; grid-template-columns:{{ portfolioCols }}; gap:14px; align-items:start;\">\n              <div style=\"position:{{ portfolioAsidePos }}; top:96px; display:flex; flex-direction:column; gap:22px; padding:26px 24px; border-radius:16px; background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.08);\">\n                <div style=\"display:flex; flex-direction:column; gap:9px;\">\n                  <span style=\"font-size:12px; font-weight:700; letter-spacing:0.14em; text-transform:uppercase; color:{{ accent }};\">{{ t.pfInfoTitle }}<\u002Fspan>\n                  <span style=\"font-size:14px; line-height:1.55; color:rgba(233,236,248,0.66);\">{{ t.pfInfoHint }}<\u002Fspan>\n                <\u002Fdiv>\n                <div style=\"display:flex; flex-direction:column; gap:12px;\">\n                  <span style=\"font-size:12px; font-weight:700; letter-spacing:0.14em; text-transform:uppercase; color:{{ accent }};\">{{ t.pfFilterTitle }}<\u002Fspan>\n                  <div style=\"display:flex; flex-wrap:wrap; gap:8px;\">\n                    <sc-for list=\"{{ portCats }}\" as=\"c\" hint-placeholder-count=\"3\">\n                      <button onclick=\"{{ c.onClick }}\" style=\"padding:9px 15px; border-radius:999px; cursor:pointer; font-size:12px; font-weight:600; letter-spacing:0.06em; text-transform:uppercase; border:1px solid {{ c.border }}; background:{{ c.bg }}; color:{{ c.color }}; transition:all .2s;\">{{ c.label }}<\u002Fbutton>\n                    <\u002Fsc-for>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n                <div style=\"display:flex; align-items:baseline; gap:10px; margin-top:2px;\">\n                  <span style=\"font-family:'Archivo Expanded','Archivo',sans-serif; font-weight:900; font-size:44px; line-height:1; color:#f4f4f7;\">{{ portfolioCount }}<\u002Fspan>\n                  <span style=\"font-size:11px; font-weight:600; letter-spacing:0.14em; text-transform:uppercase; color:rgba(233,236,248,0.5);\">{{ t.pfProjects }}<\u002Fspan>\n                <\u002Fdiv>\n                <button onclick=\"{{ goRequest }}\" class=\"btn-shine\" style=\"align-self:flex-start; padding:13px 26px; border-radius:999px; border:none; cursor:pointer; background:#f4f4f7; color:#0b0b0e; font-size:12px; font-weight:700; letter-spacing:0.1em; text-transform:uppercase; transition:transform .25s, box-shadow .25s;\" style-hover=\"transform:translateY(-2px); box-shadow:0 12px 36px {{ accentGlow }}\">{{ t.startProject }}<\u002Fbutton>\n              <\u002Fdiv>\n\n              <div style=\"display:grid; grid-template-columns:{{ portfolioGridCols }}; gap:14px;\">\n                <sc-for list=\"{{ workItems }}\" as=\"w\" hint-placeholder-count=\"6\">\n                  <button onclick=\"{{ w.onOpen }}\" class=\"zoom-media\" data-reveal-clip=\"\" style=\"position:relative; aspect-ratio:16/10; border:1px solid rgba(255,255,255,0.1); border-radius:16px; overflow:hidden; padding:0; cursor:pointer; background:#0e0e11;\">\n                    <image-slot id=\"{{ w.id }}\" shape=\"rect\" placeholder=\"{{ w.placeholder }}\" style=\"position:absolute; inset:0; width:100%; height:100%; display:block;\"><\u002Fimage-slot>\n                    <span style=\"position:absolute; inset:0; background:linear-gradient(180deg, rgba(0,0,0,0.05) 0%, transparent 42%, rgba(0,0,0,0.78) 100%); opacity:0; transition:opacity .35s ease; pointer-events:none;\" class=\"pf-veil\"><\u002Fspan>\n                    <span style=\"position:absolute; top:14px; left:16px; font-family:'Archivo',sans-serif; font-weight:700; font-size:13px; letter-spacing:0.14em; color:rgba(255,255,255,0.9); pointer-events:none;\">{{ w.counter }}<\u002Fspan>\n                    <span class=\"pf-cap\" style=\"position:absolute; left:18px; right:18px; bottom:16px; display:flex; align-items:flex-end; justify-content:space-between; gap:12px; opacity:0; transform:translateY(14px); transition:opacity .35s ease, transform .35s ease; pointer-events:none;\">\n                      <span style=\"display:flex; flex-direction:column; gap:5px; text-align:left;\">\n                        <span style=\"font-size:10px; font-weight:600; letter-spacing:0.2em; text-transform:uppercase; color:{{ accent }};\">{{ w.tag }}<\u002Fspan>\n                        <span style=\"font-family:'Archivo Expanded','Archivo',sans-serif; font-weight:800; text-transform:uppercase; font-size:clamp(18px,2vw,26px); line-height:0.98; letter-spacing:-0.015em; color:#fff;\">{{ w.title }}<\u002Fspan>\n                      <\u002Fspan>\n                      <span style=\"display:inline-flex; align-items:center; justify-content:center; width:40px; height:40px; border-radius:50%; background:rgba(244,244,247,0.94); color:#0b0b0e; font-size:14px; flex:0 0 auto;\">▶<\u002Fspan>\n                    <\u002Fspan>\n                  <\u002Fbutton>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsection>\n      <\u002Fsc-if>\n\n      <!-- ---------- PACKAGES ---------- -->\n      <sc-if value=\"{{ isPackages }}\" hint-placeholder-val=\"{{ false }}\">\n        <section data-screen-label=\"Packages\" style=\"max-width:1100px; margin:0 auto; padding:clamp(40px,7vw,80px) clamp(20px,5vw,48px) 90px;\">\n          <div data-reveal=\"\" style=\"display:flex; flex-direction:column; gap:10px; margin-bottom:44px; text-align:center; align-items:center;\">\n            <span style=\"font-size:11px; letter-spacing:0.34em; color:{{ accent }};\">PACKAGES<\u002Fspan>\n            <h1 style=\"margin:0; font-weight:200; font-size:clamp(30px,5vw,52px);\">Starting points.<\u002Fh1>\n            <p style=\"margin:0; color:rgba(233,236,248,0.5); max-width:46ch; font-size:15px;\">Every project is scoped to you — these are where most begin.<\u002Fp>\n          <\u002Fdiv>\n          <div data-reveal=\"\" style=\"display:grid; grid-template-columns:repeat(auto-fit,minmax(260px,1fr)); gap:18px; align-items:stretch; transition-delay:.1s;\">\n            <sc-for list=\"{{ packages }}\" as=\"p\" hint-placeholder-count=\"3\">\n              <div style=\"display:flex; flex-direction:column; gap:20px; padding:30px 26px; border-radius:20px; background:{{ p.bg }}; border:1px solid {{ p.border }}; box-shadow:{{ p.shadow }};\">\n                <div style=\"display:flex; flex-direction:column; gap:6px;\">\n                  <sc-if value=\"{{ p.featured }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"align-self:flex-start; font-size:10px; letter-spacing:0.22em; color:#101013; background:{{ accent }}; padding:4px 10px; border-radius:999px;\">MOST CHOSEN<\u002Fspan><\u002Fsc-if>\n                  <span style=\"font-size:20px; font-weight:400;\">{{ p.name }}<\u002Fspan>\n                  <span style=\"font-size:14px; color:rgba(233,236,248,0.55);\">{{ p.price }}<\u002Fspan>\n                <\u002Fdiv>\n                <div style=\"display:flex; flex-direction:column; gap:11px; flex:1;\">\n                  <sc-for list=\"{{ p.points }}\" as=\"pt\" hint-placeholder-count=\"3\">\n                    <span style=\"display:flex; gap:10px; font-size:13.5px; color:rgba(233,236,248,0.72); line-height:1.4;\"><span style=\"color:{{ accent }};\">—<\u002Fspan>{{ pt }}<\u002Fspan>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n                <button onclick=\"{{ p.onChoose }}\" style=\"padding:13px; border-radius:999px; cursor:pointer; border:1px solid {{ p.btnBorder }}; background:{{ p.btnBg }}; color:{{ p.btnColor }}; font-size:13.5px; font-weight:500; letter-spacing:0.03em; transition:transform .2s;\" style-hover=\"transform:translateY(-1px)\">Start with this<\u002Fbutton>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <div data-reveal=\"\" style=\"margin-top:24px; text-align:center;\">\n            <button onclick=\"{{ goRequest }}\" style=\"background:none; border:none; cursor:pointer; color:rgba(233,236,248,0.6); font-size:14px; text-decoration:underline; text-underline-offset:4px;\">Something else? Tell us what you need →<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fsection>\n      <\u002Fsc-if>\n\n      <!-- ---------- TRACK ---------- -->\n      <sc-if value=\"{{ isTrack }}\" hint-placeholder-val=\"{{ false }}\">\n        <section data-screen-label=\"Track\" style=\"max-width:720px; margin:0 auto; padding:clamp(40px,7vw,80px) clamp(20px,5vw,40px) 90px;\">\n          <div data-reveal=\"\" style=\"display:flex; flex-direction:column; gap:10px; margin-bottom:30px;\">\n            <span style=\"font-size:11px; letter-spacing:0.34em; color:{{ accent }};\">TRACK<\u002Fspan>\n            <h1 style=\"margin:0; font-weight:200; font-size:clamp(30px,5vw,48px);\">Your projects.<\u002Fh1>\n          <\u002Fdiv>\n          <input type=\"text\" value=\"{{ lookup }}\" oninput=\"{{ setLookup }}\" placeholder=\"Search by reference, e.g. DIA-7K2P\" style=\"width:100%; padding:16px 18px; border-radius:12px; background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.1); color:#e9e9ee; font-size:15px; outline:none; margin-bottom:24px;\" style-focus=\"border-color:{{ accentBorder }}\">\n\n          <sc-if value=\"{{ hasRequests }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"display:flex; flex-direction:column; gap:14px;\">\n              <sc-for list=\"{{ trackList }}\" as=\"t\" hint-placeholder-count=\"2\">\n                <div style=\"padding:22px 24px; border-radius:16px; background:rgba(255,255,255,0.035); border:1px solid rgba(255,255,255,0.08);\">\n                  <div style=\"display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:18px;\">\n                    <div style=\"display:flex; flex-direction:column; gap:4px;\">\n                      <span style=\"font-size:16px; font-weight:400;\">{{ t.type }}<\u002Fspan>\n                      <span style=\"font-size:12px; letter-spacing:0.16em; color:rgba(233,236,248,0.42);\">{{ t.id }} · {{ t.date }}<\u002Fspan>\n                    <\u002Fdiv>\n                    <span style=\"font-size:11px; letter-spacing:0.14em; padding:6px 13px; border-radius:999px; color:{{ accent }}; background:rgba(157,184,255,0.12); border:1px solid {{ accentBorder }};\">{{ t.status }}<\u002Fspan>\n                  <\u002Fdiv>\n                  <div style=\"display:flex; align-items:center; gap:6px;\">\n                    <sc-for list=\"{{ t.stages }}\" as=\"s\" hint-placeholder-count=\"4\">\n                      <div style=\"flex:1; display:flex; flex-direction:column; gap:7px;\">\n                        <div style=\"height:3px; border-radius:3px; background:{{ s.barColor }};\"><\u002Fdiv>\n                        <span style=\"font-size:9.5px; letter-spacing:0.08em; color:{{ s.labelColor }};\">{{ s.name }}<\u002Fspan>\n                      <\u002Fdiv>\n                    <\u002Fsc-for>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n          <sc-if value=\"{{ noRequests }}\" hint-placeholder-val=\"{{ true }}\">\n            <div style=\"text-align:center; padding:60px 20px; color:rgba(233,236,248,0.45); display:flex; flex-direction:column; gap:18px; align-items:center;\">\n              <p style=\"margin:0; font-size:15px;\">{{ emptyTrackMsg }}<\u002Fp>\n              <button onclick=\"{{ goRequest }}\" style=\"padding:13px 26px; border-radius:999px; border:none; cursor:pointer; background:linear-gradient(180deg,#ffffff,#cdced6); color:#101013; font-size:13.5px; font-weight:500;\">Start a project<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002 Fbutton>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <sc-for list=\"{{ offices }}\" as=\"o\" hint-placeholder-count=\"2\">\n            <div style=\"display:flex; flex-direction:column; gap:16px;\">\n              <span style=\"font-size:11px; font-weight:600; letter-spacing:0.2em; text-transform:uppercase; color:{{ accent }};\">{{ o.city }}<\u002Fspan>\n              <div style=\"display:flex; flex-direction:column; gap:8px; font-size:14px; line-height:1.55; color:rgba(233,236,248,0.7);\">\n                <span>{{ o.addr }}<\u002Fspan>\n                <a href=\"{{ o.telHref }}\" style=\"color:rgba(233,236,248,0.7); text-decoration:none;\">{{ o.phone }}<\u002Fa>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n\n          <div style=\"display:flex; flex-direction:column; gap:16px;\">\n            <span style=\"font-size:11px; font-weight:600; letter-spacing:0.2em; text-transform:uppercase; color:rgba(233,236,248,0.4);\">{{ t.footerContact }}<\u002Fspan>\n            <div style=\"display:flex; flex-direction:column; gap:11px;\">\n              <a href=\"mailto:studio@diaprod.it\" style=\"font-size:14px; color:rgba(233,236,248,0.75); text-decoration:none;\">studio@diaprod.it<\u002Fa>\n              <div style=\"display:flex; gap:16px; margin-top:4px;\">\n                <sc-for list=\"{{ socials }}\" as=\"sc\" hint-placeholder-count=\"4\">\n                  <a href=\"{{ sc.href }}\" target=\"_blank\" rel=\"noopener\" style=\"font-size:12px; font-weight:600; letter-spacing:0.08em; text-transform:uppercase; color:rgba(233,236,248,0.55); text-decoration:none; transition:color .2s;\" style-hover=\"color:#fff\">{{ sc.label }}<\u002Fa>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"display:flex; flex-wrap:wrap; align-items:center; justify-content:space-between; gap:16px; padding-top:26px;\">\n        <span style=\"font-size:12px; letter-spacing:0.06em; color:rgba(233,236,248,0.38);\">© 2026 {{ studioName }} — {{ t.footerRights }} — P.IVA 13478040010<\u002Fspan>\n        <div style=\"display:flex; gap:22px;\">\n          <span style=\"font-size:12px; color:rgba(233,236,248,0.38);\">{{ t.footerPrivacy }}<\u002Fspan>\n          <span style=\"font-size:12px; color:rgba(233,236,248,0.38);\">{{ t.footerCookies }}<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Ffooter>\n\n  <!-- ============ LIGHTBOX ============ -->\n  <div onclick=\"{{ closeWork }}\" style=\"position:fixed; inset:0; z-index:70; display:flex; align-items:center; justify-content:center; padding:clamp(16px,5vw,56px); background:rgba(6,6,8,0.9); backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px); opacity:{{ lbOpacity }}; visibility:{{ lbVis }}; pointer-events:{{ lbPE }}; transition:opacity .34s ease, visibility .34s ease;\">\n    <button onclick=\"{{ closeWork }}\" aria-label=\"Close\" style=\"position:absolute; top:max(18px,env(safe-area-inset-top)); right:20px; width:46px; height:46px; background:none; border:none; color:#e9e9ee; font-size:30px; font-weight:200; cursor:pointer; line-height:1; z-index:2;\">×<\u002Fbutton>\n    <sc-if value=\"{{ hasLightbox }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"width:100%; max-width:960px; display:flex; flex-direction:column; gap:18px;\">\n        <div style=\"position:relative; width:100%; border-radius:18px; overflow:hidden; border:1px solid rgba(255,255,255,0.1); background:#0e0e11;\">\n          <sc-if value=\"{{ lb.hasEmbed }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"position:relative; width:100%; aspect-ratio:16/9;\"><iframe src=\"{{ lb.embed }}\" allow=\"autoplay; fullscreen; picture-in-picture\" allowfullscreen=\"true\" style=\"position:absolute; inset:0; width:100%; height:100%; border:0;\"><\u002Fiframe><\u002Fdiv>\n          <\u002Fsc-if>\n          <sc-if value=\"{{ lb.noEmbed }}\" hint-placeholder-val=\"{{ true }}\">\n            <div style=\"position:relative; width:100%; aspect-ratio:16/10;\">\n              <image-slot id=\"{{ lb.id }}\" shape=\"rounded\" radius=\"18\" placeholder=\"{{ lb.placeholder }}\" style=\"position:absolute; inset:0; width:100%; height:100%; display:block;\"><\u002Fimage-slot>\n              <sc-if value=\"{{ lb.filmNoEmbed }}\" hint-placeholder-val=\"{{ false }}\">\n                <span style=\"position:absolute; left:16px; bottom:16px; font-size:12px; letter-spacing:0.04em; color:rgba(255,255,255,0.7); background:rgba(11,11,12,0.6); padding:8px 14px; border-radius:999px; backdrop-filter:blur(6px); -webkit-backdrop-filter:blur(6px); pointer-events:none;\">Add a Vimeo / YouTube link to play the film here<\u002Fspan>\n              <\u002Fsc-if>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n        <div style=\"display:flex; align-items:center; justify-content:space-between; gap:14px; flex-wrap:wrap;\">\n          <span style=\"display:flex; flex-direction:column; gap:4px;\">\n            <span style=\"font-size:clamp(20px,4vw,30px); font-weight:200;\">{{ lb.title }}<\u002Fspan>\n            <span style=\"font-size:11px; letter-spacing:0.2em; color:{{ accent }};\">{{ lb.tag }}<\u002Fspan>\n          <\u002Fspan>\n          <sc-if value=\"{{ lb.hasWatch }}\" hint-placeholder-val=\"{{ false }}\">\n            <a href=\"{{ lb.watch }}\" target=\"_blank\" rel=\"noopener\" onclick=\"{{ stopProp }}\" style=\"display:inline-flex; align-items:center; gap:9px; padding:11px 20px; border-radius:999px; text-decoration:none; background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.18); color:#e9e9ee; font-size:13px; letter-spacing:0.02em; transition:border-color .2s, background .2s;\" style-hover=\"border-color:rgba(255,255,255,0.5); background:rgba(255,255,255,0.1)\">Watch on YouTube <span style=\"font-size:14px;\">↗<\u002Fspan><\u002Fa>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n  <\u002Fdiv>\n\n  <!-- ============ MOBILE MENU ============ -->\n  <div style=\"position:fixed; inset:0; z-index:60; display:flex; flex-direction:column; padding:24px clamp(20px,6vw,40px); background:rgba(8,8,10,0.92); backdrop-filter:blur(18px); -webkit-backdrop-filter:blur(18px); opacity:{{ menuOpacity }}; visibility:{{ menuVis }}; pointer-events:{{ menuPE }}; transition:opacity .3s ease, visibility .3s ease;\">\n    <div style=\"display:flex; justify-content:flex-end;\">\n      <button onclick=\"{{ closeMenu }}\" aria-label=\"Close\" style=\"width:46px; height:46px; background:none; border:none; color:#e9e9ee; font-size:30px; font-weight:200; cursor:pointer; line-height:1;\">×<\u002Fbutton>\n    <\u002Fdiv>\n    <div style=\"flex:1; display:flex; flex-direction:column; justify-content:center; gap:6px;\">\n      <sc-for list=\"{{ menuLinks }}\" as=\"m\" hint-placeholder-count=\"5\">\n        <button onclick=\"{{ m.onClick }}\" style=\"text-align:left; background:none; border:none; cursor:pointer; padding:14px 0; font-size:30px; font-weight:200; color:{{ m.color }}; letter-spacing:-0.01em;\">{{ m.label }}<\u002Fbutton>\n      <\u002Fsc-for>\n      <button onclick=\"{{ goRequest }}\" style=\"margin-top:24px; align-self:flex-start; padding:15px 30px; border-radius:999px; border:none; cursor:pointer; background:linear-gradient(180deg,#ffffff,#cdced6); color:#101013; font-size:15px; font-weight:500; box-shadow:0 8px 30px {{ accentGlow }};\">{{ t.startProject }}<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{\n  &quot;$preview&quot;: { &quot;width&quot;: 1200, &quot;height&quot;: 820 },\n  &quot;studioName&quot;: { &quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;DIA PROD&quot;, &quot;tsType&quot;: &quot;string&quot; },\n  &quot;accent&quot;: { &quot;editor&quot;: &quot;color&quot;, &quot;default&quot;: &quot;#9db8ff&quot;, &quot;options&quot;: [&quot;#9db8ff&quot;, &quot;#e8c08a&quot;, &quot;#d98c6a&quot;, &quot;#7fe0c4&quot;], &quot;tsType&quot;: &quot;string&quot; },\n  &quot;motion&quot;: { &quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: true, &quot;tsType&quot;: &quot;boolean&quot; },\n  &quot;grain&quot;: { &quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: true, &quot;tsType&quot;: &quot;boolean&quot; }\n}\">\nclass Component extends DCLogic {\n  constructor(props){\n    super(props);\n    this.TYPES = [\n      { value:'Video production', desc:'Films, brand stories, content series' },\n      { value:'Photography', desc:'Campaigns, products, portraits' },\n      { value:'Commercials / ads', desc:'Broadcast & social spots' },\n      { value:'Music videos', desc:'Performance & narrative' },\n      { value:'Events', desc:'Live coverage & recap films' },\n      { value:'Corporate / brand films', desc:'Internal & external comms' },\n      { value:'Social media content', desc:'Short-form, vertical, recurring' },\n    ];\n    this.DELIVERABLES = ['Final edit','Raw footage','Color grade','Motion graphics','Social cuts','Stills / photos','Drone','Sound design'];\n    this.BUDGETS = ['Under $5k','$5k – $15k','$15k – $50k','$50k+','Not sure yet'];\n    this.TIMELINES = ['ASAP / rush','In 2–4 weeks','In 1–2 months','Flexible'];\n    this.STAGES = ['Received','In review','In production','Delivered'];\n    this.SLOTS = ['Tue 10:00','Tue 14:00','Wed 11:30','Thu 09:00','Thu 16:00','Fri 13:00'];\n    this.PACKAGES = [\n      { name:'Half Day', price:'from $2,500', presetType:'Photography', points:['Photo or short-form video','One location · up to 4 hours','Edited deliverables in 7 days'] },\n      { name:'Production Day', price:'from $12,000', presetType:'Video production', featured:true, points:['Full crew · one shoot day','Video + stills','Color, edit & sound included'] },\n      { name:'Signature Film', price:'from $40,000', presetType:'Corporate / brand films', points:['Multi-day · concept to delivery','Creative direction & casting','Full post-production'] },\n    ];\n    this.WORK = [\n      { id:'work-1', title:'Aether', tag:'BRAND FILM', cat:'film', embed:'', placeholder:'Drop a poster' },\n      { id:'work-2', title:'Nocturne', tag:'EDITORIAL', cat:'photo', embed:'', placeholder:'Drop a photo' },\n      { id:'work-3', title:'Last Call', tag:'BAR · COMMERCIAL', cat:'film', yt:'WvxYy4n8EYI', placeholder:'Drop a poster' },\n      { id:'work-4', title:'Meridian', tag:'PORTRAIT', cat:'photo', embed:'', placeholder:'Drop a photo' },\n      { id:'work-5', title:'Halcyon', tag:'MUSIC VIDEO', cat:'film', embed:'', placeholder:'Drop a poster' },\n      { id:'work-6', title:'Lumen', tag:'PRODUCT', cat:'photo', embed:'', placeholder:'Drop a photo' },\n      { id:'work-7', title:'Ember', tag:'EVENT FILM', cat:'film', embed:'', placeholder:'Drop a poster' },\n      { id:'work-8', title:'Cascade', tag:'CAMPAIGN', cat:'photo', embed:'', placeholder:'Drop a photo' },\n    ];\n    this.words = ['film','photography','commercial','story','vision'];\n    this.WORK.push(\n      { id:'work-9', title:'Solstice', tag:'FASHION FILM', cat:'film', embed:'', placeholder:'Drop a poster' },\n      { id:'work-10', title:'Atlas', tag:'CAMPAIGN', cat:'photo', embed:'', placeholder:'Drop a photo' },\n    );\n    this.AWARDS = ['IMAGinACTION','Fabriano Film Festival','Giffoni','REC Film Festival','Epicland'];\n    this.CASES = [\n      { workId:'work-1', client:'Aether', catEn:'Brand Film', catIt:'Brand Film',\n        resultEn:'A launch film for a fragrance house — cinema-grade craft that carried the campaign across every channel.',\n        resultIt:'Un film di lancio per una maison di profumi — qualità cinema che ha guidato la campagna su ogni canale.',\n        metric:'+240%', mLabelEn:'reach vs. prior launch', mLabelIt:'reach vs. lancio precedente' },\n      { workId:'work-3', client:'Last Call', catEn:'Commercial', catIt:'Spot',\n        resultEn:'A 30-second spot for a nightlife brand — shot, cut and delivered in two weeks flat.',\n        resultIt:'Uno spot da 30 secondi per un brand nightlife — girato, montato e consegnato in due settimane.',\n        metric:'2M+', mLabelEn:'organic views', mLabelIt:'visualizzazioni organiche' },\n      { workId:'work-8', client:'Cascade', catEn:'Campaign', catIt:'Campagna',\n        resultEn:'A full-funnel content system — one shoot, forty deliverables, a quarter of social fuel.',\n        resultIt:'Un sistema di contenuti full-funnel — uno shooting, quaranta deliverable, un trimestre di social.',\n        metric:'40', mLabelEn:'assets from one shoot', mLabelIt:'contenuti da uno shooting' },\n    ];\n    this.OFFICES = [\n      { city:'Diako Moradi', addr:'studio@diaprod.it', phone:'+39 377 090 3078', tel:'tel:+393770903078' },\n    ];\n    this.SOCIALS = [\n      { label:'Instagram', href:'https://instagram.com' },\n      { label:'Vimeo', href:'https://vimeo.com' },\n      { label:'YouTube', href:'https://youtube.com' },\n      { label:'LinkedIn', href:'https://linkedin.com' },\n    ];\n    this.DICT = {\n      en: {\n        startProject:'Start a project',\n        heroEyebrow:'Production studio · Film & Photography',\n        heroLines:['Video production','for ambitious','brands'],\n        heroSub:'A film & photography studio. Brief us once — we take it from concept to final delivery.',\n        scrollLabel:'Scroll',\n        workKicker:'Selected work', workTitle:'Recent films', workAll:'All', watch:'Watch the video',\n        awardsKicker:'Recognition', awardsTitle:'Selected at festivals & awards',\n        casesKicker:'Case studies', casesTitle:'Work that moved the needle',\n        casesSub:'Scroll through a few stories — the brief, the film, and what it did.', viewCase:'View case',\n        chapterKicker:'Chapter one', chapterTitle:'Every great story starts with the first move',\n        chapterSub:'Tell us what you\\u2019re building. A quick brief, one producer replies within a day.',\n        footerTagline:'A production studio telling brand stories with heart and craft — from concept to final cut.',\n        footerPages:'Pages', footerContact:'Contact', footerRights:'All rights reserved.',\n        footerPrivacy:'Privacy Policy', footerCookies:'Cookie Policy',\n        navHome:'Home', navWork:'Portfolio', navPackages:'Packages', navTrack:'Track', navCall:'Book a call', navSignin:'Sign in',\n        catAll:'All', catFilms:'Films', catPhoto:'Photography',\n        workMarquee:'Latest works',\n        pfQuote:'\"Shot on location. Cut with intent.\"',\n        pfShuffle:'Surprise me', pfBlurb:'Every frame here is ours — brand films, commercials and photography, start to finish.',\n        pfInfoTitle:'How to browse', pfInfoHint:'Hover a project to preview it, click to watch the full piece.',\n        pfFilterTitle:'Filter', pfProjects:'Projects',\n      },\n      it: {\n        startProject:'Inizia il progetto',\n        heroEyebrow:'Studio di produzione · Film & Fotografia',\n        heroLines:['Video produzione','per brand','ambiziosi'],\n        heroSub:'Studio di film e fotografia. Raccontaci l\\u2019idea una volta — pensiamo noi a tutto, dal concept alla consegna.',\n        scrollLabel:'Scorri',\n        workKicker:'Lavori selezionati', workTitle:'Lavori recenti', workAll:'Tutti', watch:'Guarda il video',\n        awardsKicker:'Riconoscimenti', awardsTitle:'Selezionati a festival e premi',\n        casesKicker:'Case studies', casesTitle:'Progetti che fanno la differenza',\n        casesSub:'Scorri qualche storia — il brief, il film e i risultati.', viewCase:'Vedi il caso',\n        chapterKicker:'Capitolo primo', chapterTitle:'Ogni grande storia inizia con la prima mossa',\n        chapterSub:'Raccontaci cosa stai costruendo. Un brief veloce, un producer ti risponde entro un giorno.',\n        footerTagline:'Uno studio di produzione che racconta i brand con cuore e mestiere — dal concept al montaggio finale.',\n        footerPages:'Pagine', footerContact:'Contatti', footerRights:'Tutti i diritti riservati.',\n        footerPrivacy:'Privacy', footerCookies:'Cookie',\n        navHome:'Home', navWork:'Portfolio', navPackages:'Pacchetti', navTrack:'Traccia', navCall:'Prenota una call', navSignin:'Accedi',\n        catAll:'Tutti', catFilms:'Film', catPhoto:'Foto',\n        workMarquee:'Ultimi lavori',\n        pfQuote:'\"Girato sul posto. Montato con intenzione.\"',\n        pfShuffle:'Sorprendimi', pfBlurb:'Ogni frame qui è nostro — brand film, spot e fotografia, dall\\u2019inizio alla fine.',\n        pfInfoTitle:'Come navigare', pfInfoHint:'Passa il cursore su un progetto per l\\u2019anteprima, clicca per guardarlo.',\n        pfFilterTitle:'Filtra', pfProjects:'Progetti',\n      },\n    };\n  }\n\n  state = {\n    route:'home', trans:'idle', pendingRoute:null, menuOpen:false, lang:'en', portIdx:0, portCat:'all', intro:'show',\n    vw: (typeof window!=='undefined' ? window.innerWidth : 1200),\n    step:0, stepPhase:'idle', stepDir:1,\n    draft:this.emptyDraft(), fileNames:[], submitted:false, lastId:null,\n    requests:[], lookup:'', typed:'', wordIdx:0,\n    callSlot:'', callName:'', callEmail:'', callBooked:false,\n    signinEmail:'', signedIn:false,\n    workFilter:'all', lightboxId:null,\n  };\n\n  emptyDraft(){ return { type:'', deliverables:[], budget:'', timeline:'', date:'', location:'', remote:false, brief:'', name:'', email:'', phone:'', company:'' }; }\n\n  componentDidMount(){\n    try { const r = JSON.parse(localStorage.getItem('diaprod.requests')||'[]'); if(Array.isArray(r)) this.setState({requests:r}); } catch(e){}\n    try { const d = JSON.parse(localStorage.getItem('diaprod.draft')||'null'); if(d) this.setState({draft:d}); } catch(e){}\n    this._onResize = () => this.setState({vw:window.innerWidth});\n    window.addEventListener('resize', this._onResize);\n    this._onKey = (e) => { if(e.key==='Escape'){ this.setState({menuOpen:false, lightboxId:null}); } };\n    window.addEventListener('keydown', this._onKey);\n    try { const lg=localStorage.getItem('diaprod.lang'); if(lg==='it'||lg==='en') this.setState({lang:lg}); } catch(e){}\n    this._intro1 = setTimeout(()=>this.setState({intro:'fade'}), 2200);\n    this._intro2 = setTimeout(()=>this.setState({intro:'done'}), 2900);\n  }\n  componentWillUnmount(){\n    clearTimeout(this._t); clearTimeout(this._st); clearTimeout(this._ty); clearTimeout(this._tIdle); clearTimeout(this._stIdle); clearTimeout(this._intro1); clearTimeout(this._intro2);\n    window.removeEventListener('resize', this._onResize);\n    window.removeEventListener('keydown', this._onKey);\n  }\n\n  startTyper(){\n    let wi = 0, i = 0, mode = 'type';\n    const tick = () => {\n      const full = this.words[wi];\n      if(mode==='type'){ i++; this.setState({typed:full.slice(0,i)}); if(i>=full.length){mode='hold'; this._ty=setTimeout(tick,1700); return;} this._ty=setTimeout(tick,90); }\n      else if(mode==='hold'){ mode='del'; this._ty=setTimeout(tick,60); }\n      else { i--; this.setState({typed:full.slice(0,i)}); if(i<=0){ mode='type'; wi=(wi+1)%this.words.length; this._ty=setTimeout(tick,400); return;} this._ty=setTimeout(tick,45); }\n    };\n    this._ty = setTimeout(tick, 700);\n  }\n\n  hexToRgba(hex,a){ const h=(hex||'#9db8ff').replace('#',''); const n=parseInt(h.length===3?h.split('').map(c=>c+c).join(''):h,16); return `rgba(${(n>>16)&255},${(n>>8)&255},${n&255},${a})`; }\n  darken(hex,f){ const h=(hex||'#9db8ff').replace('#',''); const n=parseInt(h.length===3?h.split('').map(c=>c+c).join(''):h,16); return `rgb(${Math.round(((n>>16)&255)*f)},${Math.round(((n>>8)&255)*f)},${Math.round((n&255)*f)})`; }\n  setLang(l){ if(l!==this.state.lang){ this.setState({lang:l}); try{localStorage.setItem('diaprod.lang',l);}catch(e){} } }\n  filteredWork(){ const wf=this.state.portCat; return this.WORK.filter(w=> wf==='all' || w.cat===wf); }\n  setPortCat(c){ this.setState({portCat:c, portIdx:0}); }\n  portMove(dir){ const n=this.filteredWork().length; if(!n) return; this.setState(s=>({portIdx:((s.portIdx+dir)%n+n)%n})); }\n\n  motion(){ return this.props.motion ?? true; }\n\n  go(route){\n    if(route===this.state.route && this.state.trans==='idle'){ this.setState({menuOpen:false}); return; }\n    if(!this.motion()){ this.setState({route, menuOpen:false}); window.scrollTo(0,0); return; }\n    clearTimeout(this._t); clearTimeout(this._tIdle);\n    this.setState({trans:'exit', menuOpen:false});\n    this._t = setTimeout(()=>{\n      window.scrollTo(0,0);\n      this.setState({route, trans:'enter'}, ()=>{\n        requestAnimationFrame(()=>requestAnimationFrame(()=>{ if(this.state.trans==='enter') this.setState({trans:'idle'}); }));\n        this._tIdle = setTimeout(()=>{ if(this.state.trans!=='idle') this.setState({trans:'idle'}); }, 80);\n      });\n    }, 290);\n  }\n\n  changeStep(n,dir){\n    if(!this.motion()){ this.setState({step:n}); return; }\n    clearTimeout(this._st); clearTimeout(this._stIdle);\n    this.setState({stepPhase:'exit', stepDir:dir});\n    this._st = setTimeout(()=>{\n      this.setState({step:n, stepPhase:'enter'}, ()=>{\n        requestAnimationFrame(()=>requestAnimationFrame(()=>{ if(this.state.stepPhase==='enter') this.setState({stepPhase:'idle'}); }));\n        this._stIdle = setTimeout(()=>{ if(this.state.stepPhase!=='idle') this.setState({stepPhase:'idle'}); }, 70);\n      });\n    }, 240);\n  }\n  nextStep(){ if(this.canProceed() && this.state.step<7) this.changeStep(this.state.step+1, 1); }\n  prevStep(){ if(this.state.step>0) this.changeStep(this.state.step-1, -1); }\n  goStep(n){ this.changeStep(n, n>this.state.step?1:-1); }\n\n  setField(k,v){ this.setState(s=>({draft:{...s.draft,[k]:v}}), ()=>{ try{localStorage.setItem('diaprod.draft', JSON.stringify(this.state.draft));}catch(e){} }); }\n  toggleDeliverable(d){ this.setState(s=>{ const has=s.draft.deliverables.includes(d); const deliverables=has?s.draft.deliverables.filter(x=>x!==d):[...s.draft.deliverables,d]; return {draft:{...s.draft,deliverables}}; }, ()=>{ try{localStorage.setItem('diaprod.draft', JSON.stringify(this.state.draft));}catch(e){} }); }\n\n  onFiles(e){ const names=[...e.target.files].map(f=>f.name); this.setState(s=>({fileNames:[...s.fileNames,...names]})); }\n  removeFile(i){ this.setState(s=>({fileNames:s.fileNames.filter((_,idx)=>idx!==i)})); }\n\n  canProceed(){\n    const d=this.state.draft;\n    switch(this.state.step){\n      case 0: return !!d.type;\n      case 1: return d.deliverables.length>0;\n      case 2: return !!d.budget;\n      case 3: return !!d.timeline;\n      case 4: return d.remote || d.location.trim().length>0;\n      case 5: return d.brief.trim().length>=12;\n      case 6: return d.name.trim().length>0 && /.+@.+\\..+/.test(d.email);\n      default: return true;\n    }\n  }\n\n  submit(){\n    const d=this.state.draft;\n    const id='DIA-'+Math.random().toString(36).slice(2,6).toUpperCase();\n    const rec={ id, type:d.type, deliverables:d.deliverables, budget:d.budget, timeline:d.timeline, date:d.date, location:d.remote?'Remote':d.location, brief:d.brief, name:d.name, email:d.email, phone:d.phone, company:d.company, files:this.state.fileNames, status:'Received', stage:0, created:Date.now() };\n    const requests=[rec, ...this.state.requests];\n    try{ localStorage.setItem('diaprod.requests', JSON.stringify(requests)); localStorage.removeItem('diaprod.draft'); }catch(e){}\n    this.setState({requests, submitted:true, lastId:id, draft:this.emptyDraft(), fileNames:[], step:0});\n    window.scrollTo(0,0);\n  }\n  startAnother(){ this.setState({submitted:false, step:0}); }\n  setFilter(f){ this.setState({workFilter:f}); }\n  openWork(id){ this.setState({lightboxId:id}); }\n  closeWork(){ this.setState({lightboxId:null}); }\n\n  fmtDate(ts){ try{ return new Date(ts).toLocaleDateString(undefined,{month:'short',day:'numeric',year:'numeric'}); }catch(e){ return ''; } }\n\n  renderVals(){\n    con
