  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

abelle Supabase (report_pages, report_videos, report_staff,\n  //  report_notifications) — non serve piu' toccare questo file.\n  // ─────────────────────────────────────────────────────────────\n  rootRef = React.createRef();\n  bellRef = React.createRef();\n  _timers = [];\n  _pollTimer = null;\n  _pwd = null;\n  state = {\n    anim: 0,\n    phase: \"login\",            // login | intro | app\n    user: \"\",\n    typed: 0,\n    showCursor: false,\n    exiting: false,\n    formUser: \"\",\n    formPass: \"\",\n    sending: false,\n    error: \"\",\n    selected: null,\n    night: false,\n    showVideos: false,\n    showNotif: false,\n    read: {},\n    bellRing: false,\n    notifPos: { top: 56, right: 16 },\n    selectedDay: null,\n    date: \"2026-06-29\",\n    staff: [],\n    notifications: [],\n    pages: [],\n  };\n\n  ease(x) { return x >= 1 ? 1 : 1 - Math.pow(2, -10 * x); }\n\n  // Garantisce che il client Supabase sia pronto prima dell'uso.\n  // Evita il \"Servizio non disponibile\" quando lo script del CDN\n  // non ha ancora finito di caricarsi al momento del login.\n  ensureSb = async () => {\n    if (window.sb) return window.sb;\n    if (!window.supabase) {\n      await new Promise((resolve) => {\n        const existing = document.querySelector('script[data-sb-cdn]');\n        if (existing) {\n          if (window.supabase) return resolve();\n          existing.addEventListener('load', resolve, { once: true });\n          existing.addEventListener('error', resolve, { once: true });\n          return;\n        }\n        const s = document.createElement('script');\n        s.src = 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2';\n        s.setAttribute('data-sb-cdn', '');\n        s.onload = resolve;\n        s.onerror = resolve;\n        document.head.appendChild(s);\n      });\n    }\n    if (window.supabase && !window.sb) {\n      window.sb = window.supabase.createClient(\n        'https://convkywqutizvkwmgcda.supabase.co',\n        'sb_publishable_IbO08MQtTPUtkz_Ze-uksA_p16HzXS_'\n      );\n    }\n    return window.sb || null;\n  };\n\n  startAnim = () => {\n    if (this._raf) cancelAnimationFrame(this._raf);\n    this.setState({ anim: 0 });\n    const dur = 1200, start = performance.now();\n    const step = (now) => {\n      const p = Math.min(1, (now - start) / dur);\n      this.setState({ anim: p });\n      if (p < 1) this._raf = requestAnimationFrame(step);\n    };\n    this._raf = requestAnimationFrame(step);\n  };\n\n  // ── auth ──\n  norm(s) { return (s || \"\").trim().toLowerCase().replace(/\\s+/g, \" \"); }\n  onUserInput = (e) => this.setState({ formUser: e.target.value, error: \"\" });\n  onPassInput = (e) => this.setState({ formPass: e.target.value, error: \"\" });\n  onKey = (e) => { if (e.key === \"Enter\") this.submitLogin(); };\n\n  logEvent = async (name, type) => {\n    const sb = await this.ensureSb();\n    if (!sb || !name) return;\n    try { await sb.from(\"Login_events\").insert({ user_email: name, event_type: type }); } catch (e) {}\n  };\n\n  submitLogin = async () => {\n    const name = (this.state.formUser || \"\").trim();\n    const pass = this.state.formPass || \"\";\n    if (!name) { this.setState({ error: \"Inserisci il tuo nome.\" }); return; }\n    if (!pass) { this.setState({ error: \"Inserisci la password.\" }); return; }\n    this.setState({ error: \"\", sending: true });\n    const sb = await this.ensureSb();\n    if (!sb) { this.setState({ error: \"Servizio non disponibile. Riprova piu tardi.\", sending: false }); return; }\n    try {\n      const { data, error } = await sb.rpc(\"get_dashboard\", { pwd: pass });\n      if (error) { this.setState({ error: \"Errore: \" + error.message, sending: false }); return; }\n      if (!data || !data.ok) {\n        const msg = (data && data.reason === \"locked\")\n          ? \"Troppi tentativi. Riprova tra qualche minuto.\"\n          : \"Password errata. Riprova.\";\n        this.setState({ error: msg, sending: false, formPass: \"\" });\n        return;\n      }\n      const staff = data.staff || [];\n      const canon = staff.find((s) => s.toLowerCase() === name.toLowerCase());\n      const display = canon || name.charAt(0).toUpperCase() + name.slice(1);\n      this.logEvent(display, \"login\");\n      this.clearTimers();\n      this._pwd = pass; // tenuta in memoria solo per aggiornare i dati in background durante la sessione\n      this.setState({\n        phase: \"intro\", user: display, formPass: \"\", error: \"\", sending: false,\n        selected: null, typed: 0, showCursor: false, exiting: false,\n        staff, notifications: data.notifications || [], pages: data.pages || [],\n      });\n      this.runIntro(display);\n      this.pushSystemNotif(display);\n      this.startPolling();\n    } catch (e) {\n      this.setState({ error: \"Errore di rete. Riprova.\", sending: false });\n    }\n  };\n\n  // ricontrolla Supabase ogni tot secondi cosi' nuove notifiche/numeri\n  // arrivano da soli, senza dover uscire e rientrare\n  startPolling = () => {\n    this.stopPolling();\n    this._pollTimer = setInterval(this.refreshData, 40000);\n  };\n  stopPolling = () => {\n    if (this._pollTimer) clearInterval(this._pollTimer);\n    this._pollTimer = null;\n  };\n  refreshData = async () => {\n    if (!this._pwd || this.state.phase === \"login\") return;\n    const sb = await this.ensureSb();\n    if (!sb) return;\n    try {\n      const { data } = await sb.rpc(\"get_dashboard\", { pwd: this._pwd });\n      if (data && data.ok) {\n        this.setState({ notifications: data.notifications || [], pages: data.pages || [] });\n      }\n    } catch (e) {}\n  };\n\n  notifsFor(user) {\n    const u = (user || \"\").toLowerCase();\n    return (this.state.notifications || []).filter((n) => n.to === \"all\" || n.to.toLowerCase() === u);\n  }\n\n  // notifica di sistema del browser all'accesso (se l'utente concede il permesso)\n  pushSystemNotif = (user) => {\n    if (typeof Notification === \"undefined\") return;\n    const items = this.notifsFor(user);\n    const fire = () => {\n      if (Notification.permission !== \"granted\" || !items.length) return;\n      try {\n        new Notification(\"Geiby · Ciao \" + user, {\n          body: items.length + (items.length === 1 ? \" nuova notifica\" : \" nuove notifiche\") + \" · \" + items[0].title,\n          tag: \"geiby-login\",\n        });\n      } catch (e) {}\n    };\n    if (Notification.permission === \"granted\") fire();\n    else if (Notification.permission !== \"denied\") {\n      try { Notification.requestPermission().then(fire); } catch (e) {}\n    }\n  };\n\n  runIntro = (name) => {\n    this.clearTimers();\n    const push = (fn, ms) => this._timers.push(setTimeout(fn, ms));\n    const start = 560, per = 85;\n    for (let i = 1; i <= name.length; i++) push(() => this.setState({ typed: i }), start + i * per);\n    const typedEnd = start + name.length * per;\n    push(() => this.setState({ showCursor: true }), typedEnd + 420);\n    push(() => this.setState({ exiting: true }), typedEnd + 420 + 880);\n    push(() => { this.setState({ phase: \"app\" }); this.startAnim(); }, typedEnd + 420 + 880 + 520);\n  };\n\n  clearTimers = () => { if (this._timers) this._timers.forEach(clearTimeout); this._timers = []; };\n  logout = async () => {\n    await this.logEvent(this.state.user, \"logout\");\n    this.clearTimers();\n    this.stopPolling();\n    this._pwd = null;\n    this.setState({ phase: \"login\", user: \"\", formUser: \"\", formPass: \"\", selected: null, showVideos: false, showNotif: false, read: {}, error: \"\", typed: 0, showCursor: false, exiting: false, staff: [], notifications: [], pages: [] });\n  };\n\n  // ── nav ──\n  selectPage = (i) => { this.setState({ selected: i, selectedDay: null }); this.startAnim(); };\n  goHome = () => { this.setState({ selected: null, selectedDay: null }); this.startAnim(); };\n  openVideos = () => this.setState({ showVideos: true });\n  closeVideos = () => this.setState({ showVideos: false });\n  stop = (e) => { e.stopPropagation(); };\n  selectDay = (dateStr) => {\n    this.setState((s) => ({ selectedDay: s.selectedDay === dateStr ? null : dateStr }));\n  };\n\n  componentDidMount() { this.applyAccent(); this.applyTheme(); this.startAnim(); }\n  componentDidUpdate() { this.applyAccent(); this.applyTheme(); }\n  componentWillUnmount() { if (this._raf) cancelAnimationFrame(this._raf); this.clearTimers(); this.stopPolling(); }\n\n  applyAccent() {\n    const ac = this.props.accent;\n    if (this.rootRef.current && ac) this.rootRef.current.style.setProperty(\"--ac\", ac);\n  }\n\n  applyTheme() {\n    const ac = this.props.accent || \"#0071e3\";\n    const L = {\n      \"--surface\": \"#ffffff\", \"--text\": \"#1d1d1f\", \"--muted\": \"#6e6e73\", \"--dim\": \"#86868b\",\n      \"--faint\": \"#a1a1a6\", \"--hint\": \"#d2d2d7\", \"--note\": \"#424245\",\n      \"--border\": \"rgba(0,0,0,.08)\", \"--border-strong\": \"rgba(0,0,0,.14)\",\n      \"--track\": \"#f5f5f7\",\n      \"--page-bg\": \"#f5f5f7\",\n      \"--page-bg-solid\": \"#f5f5f7\",\n      \"--glow1\": \"color-mix(in oklab, \" + ac + \" 14%, transparent)\",\n      \"--glow2\": \"color-mix(in oklab, \" + ac + \" 8%, transparent)\",\n      \"--glow-blur\": \"60px\",\n    };\n    const N = {\n      \"--surface\": \"#1c1c1e\", \"--text\": \"#f5f5f7\", \"--muted\": \"#a1a1a6\", \"--dim\": \"#98989d\",\n      \"--faint\": \"#6e6e73\", \"--hint\": \"#48484a\", \"--note\": \"#e5e5e5\",\n      \"--border\": \"rgba(255,255,255,.14)\", \"--border-strong\": \"rgba(255,255,255,.22)\",\n      \"--track\": \"rgba(255,255,255,.08)\",\n      \"--page-bg\": \"#000000\",\n      \"--page-bg-solid\": \"#000000\",\n      \"--glow1\": \"rgba(10,132,255,.32)\", \"--glow2\": \"rgba(94,92,230,.24)\",\n      \"--glow-blur\": \"70px\",\n    };\n    const v = this.state.night ? N : L;\n    const el = this.rootRef.current;\n    if (!el) return;\n    for (const k in v) el.style.setProperty(k, v[k]);\n  }\n\n  toggleTheme = () => this.setState((s) => ({ night: !s.night }));\n\n  // ── notifiche ──\n  toggleNotif = () => {\n    this.setState((s) => {\n      if (s.showNotif) return { showNotif: false };\n      this.refreshData(); // controlla subito, non aspettare il prossimo giro del polling\n      // alla apertura, segna come lette quelle dell'utente\n      const read = Object.assign({}, s.read);\n      this.notifsFor(s.user).forEach((n) => { read[n.id] = true; });\n      // misura la posizione reale della campanella, cosi' il pannello si apre\n      // sempre esattamente sotto di essa, indipendentemente da wrap/layout\n      let notifPos = { top: 56, right: 16 };\n      if (this.bellRef.current) {\n        const r = this.bellRef.current.getBoundingClientRect();\n        const gap = 10;\n        const panelW = Math.min(330, window.innerWidth - 24);\n        let right = window.innerWidth - r.right;\n        right = Math.max(12, Math.min(right, window.innerWidth - panelW - 12));\n        notifPos = { top: r.bottom + gap, right };\n      }\n      return { showNotif: true, read, notifPos };\n    });\n  };\n  markAllRead = (e) => {\n    if (e) e.stopPropagation();\n    const read = Object.assign({}, this.state.read);\n    this.notifsFor(this.state.user).forEach((n) => { read[n.id] = true; });\n    this.setState({ read });\n  };\n  openNotif = (n) => {\n    const read = Object.assign({}, this.state.read);\n    read[n.id] = true;\n    let selected = this.state.selected;\n    if (n.page) {\n      const i = this.state.pages.findIndex((p) => p.name === n.page);\n      if (i >= 0) selected = i;\n    }\n    this.setState({ read, showNotif: false, selected });\n    this.startAnim();\n  };\n\n  renderVals() {\n    const t = this.ease(this.state.anim);\n    const r = (n) => Math.round(n);\n    const sel = this.state.selected;\n    const phase = this.state.phase;\n    const authed = phase !== \"login\";\n    const isHome = phase === \"app\" && sel === null;\n\n    const dt = new Date(this.state.date + \"T00:00:00\");\n    let dl = new Intl.DateTimeFormat(\"it-IT\", { weekday: \"long\", day: \"numeric\", month: \"long\", year: \"numeric\" }).format(dt);\n    dl = dl.charAt(0).toUpperCase() + dl.slice(1);\n\n    const h = new Date().getHours();\n    const greeting = h < 13 ? \"Benvenuto\" : h < 18 ? \"Buon pomeriggio\" : \"Buonasera\";\n\n    const homePages = this.state.pages.map((p, i) => ({\n      name: p.name,\n      idx: \"0\" + (i + 1),\n      delay: (0.12 + i * 0.06) + \"s\",\n      total: r((p.daGirare + p.daEditare + p.daAutorizzare + p.pronti.length) * t),\n      open: () => this.selectPage(i),\n    }));\n\n    const out = {\n      rootRef: this.rootRef,\n      glow: this.props.glow ?? true,\n      nome: this.state.user,\n      greeting,\n      dateUpper: dl.toUpperCase(),\n      isAuthed: authed,\n      isLogin: phase === \"login\",\n      isIntro: phase === \"intro\",\n      isHome,\n      isDetail: phase === \"app\" && sel !== null,\n      typedName: (this.state.user || \"\").slice(0, this.state.typed),\n      showCursor: this.state.showCursor,\n      introBackdrop: this.state.exiting ? \"0\" : \"1\",\n      frameAnim: this.state.exiting ? \"introExit .55s cubic-bezier(.4,0,.2,1) forwards\" : \"frameOpen .6s cubic-bezier(.28,.11,.32,1) both\",\n      pillAnim: this.state.showCursor ? \"pillPress 1.15s ease both\" : \"none\",\n      homePages,\n      goHome: this.goHome,\n      toggleTheme: this.toggleTheme,\n      logout: this.logout,\n      toggleNotif: this.toggleNotif,\n      markAllRead: this.markAllRead,\n      showNotif: this.state.showNotif,\n      notifTop: this.state.notifPos.top + \"px\",\n      notifRight: this.state.notifPos.right + \"px\",\n      bellRef: this.bellRef,\n      themeIcon: this.state.night ? \"\\u263E\" : \"\\u2600\",\n      themeLabel: this.state.night ? \"Notte\" : \"Giorno\",\n      // login\n      formUser: this.state.formUser,\n      formPass: this.state.formPass,\n      submitLabel: this.state.sending ? \"Verifica\\u2026\" : \"Entra \\u2192\",\n      error: this.state.error,\n      hasError: !!this.state.error,\n      onUserInput: this.onUserInput,\n      onPassInput: this.onPassInput,\n      onKey: this.onKey,\n      submitLogin: this.submitLogin,\n      // overlay\n      showVideos: this.state.showVideos && sel !== null,\n      openVideos: this.openVideos,\n      closeVideos: this.closeVideos,\n      stop: this.stop,\n    };\n\n    // ── notifiche per l'utente loggato ──\n    const mine = authed ? this.notifsFor(this.state.user) : [];\n    const unread = mine.filter((n) => !this.state.read[n.id]);\n    out.unreadCount = unread.length;\n    out.hasUnread = unread.length > 0;\n    out.bellAnim = (this.state.showNotif || unread.length === 0) ? \"none\" : \"bellRing 2.4s ease-in-out 1.2s infinite\";\n    out.noNotif = mine.length === 0;\n    out.notifList = mine.map((n, i) => {\n      const isUnread = !this.state.read[n.id];\n      return {\n        title: n.title,\n        body: n.body,\n        time: n.time,\n        delay: (i * 0.05) + \"s\",\n        bg: isUnread ? \"color-mix(in oklab,var(--ac,#0071e3) 7%,var(--surface,#fff))\" : \"var(--track,#f5f5f7)\",\n        dot: isUnread ? \"var(--ac,#0071e3)\" : \"var(--hint,#d2d2d7)\",\n        dotGlow: isUnread ? \"0 0 8px color-mix(in oklab,var(--ac,#0071e3) 60%,transparent)\" : \"none\",\n        open: () => this.openNotif(n),\n      };\n    });\n\n    if (phase === \"app\" && sel !== null) {\n      const p = this.state.pages[sel];\n      const pub = p.pronti.length;\n      const maxS = Math.max(p.daGirare, p.daEditare, p.daAutorizzare, pub, 1);\n      const mk = (label, n) => ({ label, count: r(n * t), w: (n / maxS) * 100 * t + \"%\" });\n      out.curName = p.name;\n      out.curNota = p.nota;\n      out.girareN = r(p.daGirare * t);\n      out.editareN = r(p.daEditare * t);\n      out.autorizzareN = r(p.daAutorizzare * t);\n      out.pubblicareN = pub;\n      out.stages = [\n        mk(\"Da girare\", p.daGirare),\n        mk(\"Da editare\", p.daEditare),\n        mk(\"Da autorizzare\", p.daAutorizzare),\n        mk(\"Da pubblicare\", pub),\n      ];\n      const pubd = p.pubblicati || [];\n      out.hasPubblicati = pubd.length > 0;\n      out.pubblicatiCount = pubd.length;\n      out.curPubblicati = pubd.map((v, i) => ({ title: v.title, url: v.url, delay: (i * 0.05) + \"s\" }));\n      out.curPronti = p.pronti.map((v, i) => ({\n        title: v.title,\n        url: v.url,\n        num: (i + 1 < 10 ? \"0\" : \"\") + (i + 1),\n        delay: (i * 0.04) + \"s\",\n      }));\n\n      // ── calendario: oggi + prossimi 6 giorni ──\n      const fmtDate = (d) => {\n        const y = d.getFullYear(), m = String(d.getMonth() + 1).padStart(2, \"0\"), da = String(d.getDate()).padStart(2, \"0\");\n        return y + \"-\" + m + \"-\" + da;\n      };\n      const dowLabels = [\"Dom\", \"Lun\", \"Mar\", \"Mer\", \"Gio\", \"Ven\", \"Sab\"]; // indicizzato su getDay() (0 = domenica)\n      const today = new Date();\n      const todayStr = fmtDate(today);\n      const byDate = {};\n      (p.schedule || []).forEach((s) => { byDate[s.date] = s; });\n      out.weekCells = Array.from({ length: 7 }, (_, i) => {\n        const d = new Date(today);\n        d.setDate(today.getDate() + i);\n        const dateStr = fmtDate(d);\n        const entry = byDate[dateStr];\n        const isToday = i === 0;\n        const isSelected = this.state.selectedDay === dateStr;\n        return {\n          label: dowLabels[d.getDay()],\n          dayNum: d.getDate(),\n          bg: isSelected ? \"color-mix(in oklab,var(--ac,#0071e3) 8%,var(--surface,#fff))\" : \"var(--track,#f5f5f7)\",\n          border: isSelected ? \"var(--ac,#0071e3)\" : \"var(--border,rgba(0,0,0,.08))\",\n          labelColor: isToday ? \"var(--ac,#0071e3)\" : \"var(--dim,#86868b)\",\n          numColor: isToday ? \"var(--ac,#0071e3)\" : \"var(--text,#1d1d1f)\",\n          dot: entry ? \"var(--ac,#0071e3)\" : \"transparent\",\n          select: () => this.selectDay(dateStr),\n        };\n      });\n      const selEntry = this.state.selectedDay ? byDate[this.state.selectedDay] : null;\n      out.hasSelectedDay = !!this.state.selectedDay;\n      out.selectedHasVideo = !!selEntry;\n      out.selectedNoVideo = !!this.state.selectedDay && !selEntry;\n      out.selectedTitle = selEntry ? selEntry.title : \"\";\n      out.selectedUrl = selEntry ? selEntry.url : \"\";\n    }\n    return out;\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
